body:
  text: 詩故卷九明朱謀㙔撰大雅文王篇者文王受命作周也非受命作周也周公相成王宗祀文王于明堂以配上帝因述文德以訓于王也禮祖有功而宗有德周之先公盛德莫如文王故宗祀之曰亹亹曰穆穆曰緝熙敬止皆其德之著見者唯其有是盛德故大命集于有周而其孫子光有天下濟濟多士為之楨幹商之孫子咸來臣服而助祭于廟庭焉蓋殷未喪天下時亦嘗以其祖之有德者配天矣今既改命則配天者文王矣天命可不畏哉可不虞度其豫奪之際哉然而上天之事無聲臭可求矧儀刑乎唯當儀刑文王之德則萬邦咸信而奉戴之天命常在我矣陳錫哉周侯文王孫子言上帝敷錫大命以顯融文王之德故孫子世受其福也裸將謂將灌鬯之事北音重濁故讀灌為裸大明文王有明德故天復命武王也非此之謂也是詩蓋述武王伐商之事推本受天命則由王季文王之德也王季太任維德之行故能生此文王文王厥德不回又娶太姒是以篤生武王乃有伐商之事也調適得宜之謂燮武王應天順人而伐紂故曰燮伐大商矢誓也謂誓師也維豫侯興三語即誓辭也凉韓詩作亮訓相也謂師尚父實相佐武王成克商之功也古者兩君相見則歌大明蓋欲其知周德之有自使畏天命而述職耳綿文王之興本由大王也非此之謂也蓋周公相成王追王太王祀以天子之禮而述其造周之事以明當王之意也所謂太王者古公亶父是也太王自豳為狄所逼避而之岐疆理土田營建宫室城邑以完制度以備即其勢力足以克復舊物雪前日之愠然猶與狄通其聘問待時乃舉故四郊之柞棫既拔征伐之道路亦開昆夷憚其報復不俟驅逐一皆逺遁維喙息之不暇也此詩八章太王之事已具末又舉文王虞芮之訟似不相屬疑他篇之錯簡棫朴文王能官人也此蓋周公追述其事故稱辟王稱周王夀考首言棫朴小材祗供薪槱語奔走使令之臣也繼稱髦士奉璋則賢俊進矣繼言六師及之則得人益衆矣水氣至薄積而為雲漢猶能為章于天周王夀考德教入人深矣寧能不興起此多士乎金王必追琢之乃後見寶人材必教育之乃後成德此文王勉勉設教唯以綱紀四方而已旱麓受祖也是蓋王用享于岐山之詩也何以言之曰清酒曰騂牡曰千祿曰神所勞矣皆享事也曰旱麓知大雩也因雩而享故曰求福不回曰鳶飛曰魚躍言精誠之格于上下也録是詩者著勤民也思齊文王所以聖也此周公述文王之德而推本其所生之母能孝能慈教之有自故在宗則能順事于先公處家則能儀刑于妻子在宫則雍雍以和在廟則肅肅以敬不顯亦臨不愧屋漏也無射亦保檢身若不及也無射非無厭也謂無間隙之失如律中之無射也有是德矣故戎疾不殄烈假不瑕蓋其性與天合不必聞之傅師而自中法式不必資之諫諍而自入道義所謂戎疾大可疾惡者蓋謂紂也所謂烈假猶易稱王假有家之假功烈所假謂三分天下有其二也言文王智力足以殄絶紂命則以畏天之故不即殄之身受諸侯之朝顧又率諸侯以事紂而人不敢瑕議之其敦德躬行有如此故成人小子莫不是則是效一皆行古之道而得美俊之譽也皇矣美周也非美周也述文王伐密伐崇之事而推本太伯王季克讓以至于文也周自后稷封邰歷夏商二代千有餘年而得文王中間自邰竄豳自豳遷岐皆在西北故曰乃眷西顧此維與宅謂岐周也帝已作邦于岐向非太伯能讓則文王何能光有大業故太伯之讓實能篤厚周家之慶也上帝耆之耆訓為老謂求老成之國而式用以廓清其亂乃授周以西土也串夷載路周頌所謂彼徂矣岐有夷之行也畔援猶言判渙怠而後時之義也歆羡則汲汲而先事矣謂不後不先適當可伐之機也聲色孟子所謂聲音笑貌是也言執𤣥德而化馳若神不以聲色為大也夏謂染采以飾外革謂㼱皮以矯揉不以夏革為長謂其誠實無僞也靈臺民始附也非民始附也文王為靈臺以望氛祲察災祥因為辟雍而作樂章以肄習其間也毛傳但言鼉為魚屬陸疏乃云鼉皮可以冒鼓愚按八音之革原用牛革而鼉皮之鼓似非先王正樂當闕其疑下武繼文也武王克商放牛休馬載櫜弓矢故周公述其事而作是詩下武謂以武功為下明周家世尚文德也三后之神以文德在天故武王偃武修文于鎬京以配對之永言配命謂恆以配對天命為言而成王者中孚之德也能成其孚則下國是效矣孚下國者莫大于孝思天下諸侯所以愛戴于王一人應以順德者由武王能嗣祖考未卒之業而定天下也凡此孝思不唯昭此嗣服亦將昭之方來使繩祖武于萬年矣受天之祐四方來賀藩屏以佐周室至于萬年豈不同其久逺哉文王有聲繼伐也言功伐之能相繼也文始治岐義聞宣昭四國來朝則以道路險逺艱于往來故自岐遷豐以求安定示大業之垂成及武王克商撫有天下益廣其都㑹之所自豐遷鎬以詒子孫于安皆大君之淵謀也蓋岐在今陜西之鳯翔豐在今陜西之西安豐鎬相去二十五里而岐山則在豐鎬之西三百餘里矣生民尊祖也何以尊祖周公相成王郊祀后稷以配天而推本其受命之祥與樹藝稼穡之功也姜嫄者帝嚳之世妃從帝祈子郊禖其精誠敏于感神故曰履帝武敏歆俗儒誤釋遂謂見大人迹而履其拇妄誕甚矣羅願稱羊生六月為􅧌七月為羍先生如羍蓋不俟十月之彌而先生故曰載震載夙語先期也大戴記稱陸終之妻女隤孕三年而始粥啓其左脅六人出焉昆吾參胡彭祖鄫人曹姓芈姓是已古先賢聖之産多異常人而后稷特無它異故曰不坼不副所以顯赫其靈者實上帝安寧之將欲使樹稼穡而康禋祀之典也腓字鳥覆極言其為神靈所護不必實有其事也軷與祓通取羝以祓謂以犧羊祀方社田祖祓除螟螣蟊賊之害故曰以興嗣歲皆農事也若謂軷為道祭大不然矣后稷勤勞稼穡民享其賜有如此故宜配祀于天乃無罪悔郭景純言秬秠皆黑黍一稃二米者而秬或一稃三四米故得巨名宗廟用秬釀酒尚嘉異之物也糜與􅚂通今赤粱也芑則白粱粟也北方多黃粱而赤白粱以少見貴故曰天降嘉種行葦忠厚也此燕諸父兄弟之詩也桓寬引古語曰檀柘而有鄉萑葦而有􅓜言物類之相從也蘆葦旁無枝幹所恃􅓜􅓜相依而後能立喻兄弟親族理宜敦睦而後王室有所夾輔也春雨既濡正祭祀之時因覩行葦方苞以興感既祭而燕所以敦親既燕而射又以考德射不勝者酌以大斗祈其耄勤稱道不亂以引翼我曾孫竝受福也既醉太平也非也此諸父兄弟答行葦也國語叔向說此詩曰類也者不忝前哲之謂也壼也者廣裕人民之謂也室家之壼猶言室家溱溱耳非謂宫巷之深逺也堯典九族既睦平章百姓百姓昭明協和萬邦此云昭明有融是皆平章之效也女士猶言士女倒文叶韻耳非謂女之有士行者從以孫子猶言以從爾之子孫蓋國以民為本士女受釐而蕃庶是國家景命之著見者也鳬鷖守成也非守成也燕公尸也祭先公必卜子孫為之尸祭之明日又燕攝尸者此其樂歌也鳬鷖水鳥性警善飛苟有猜疑不安則飛擾逺去此云鳬鷖在涇在沙在渚知其安閒自適喻公尸之安其燕也假樂嘉成王也非嘉成王也公尸答鳬鷖之樂歌也左傳中庸引詩皆作嘉樂嘉假聲相近而誤耳嘉樂君子猶言樂只君子也武王稱諸侯為友邦冡君酒誥亦稱太史友內史友伐木詩稱友生故曰燕及朋友公劉召康公戒成王也詩無戒意蓋召公述公劉造豳之事以告成王使知王業所由始耳始后稷封于有邰蓋歷數世而後夏衰用失其官而不窋竄居戎翟之間至公劉而始能國乃相民居定京邑立宗廟制三軍行徹法足材用終周之世以徹田為取民之則也公劉居豳而涉渭采取金石之材就汭水以止其旅明闢境廣逺為遷岐之階級也泂酌召康公戒成王也非戒也乃誨也誨其化民當以漸也西北泉多苦鹹居民每挹行潦注之罌罍而澄清之以治飲食蓋行潦雖濁久澄則清喻民德雖暗教深則化故必豈以强教之弟以恱安之豈弟君子民之父母教民之道莫尚于此矣卷阿召康戒成王也非戒也亦誨也周公復子明辟成王始親政事召公故陳泂酌卷阿二詩以誨迪于王地之髙平曰陸大陸曰阜大阜曰陵大陵曰阿云卷阿者大陵而卷曲足蔽衝風而集燠氣者也飄風自南則仲夏也草木於是乎蕃廡景物於是乎鮮華王以是時來游欣暢可知矣誠能茂對天時覆育萬物使之各遂其生是謂能盡其性而能盡人之性可以贊天地之化育矣故曰豈弟君子俾爾彌爾性似先公酋矣百神爾主矣純嘏爾常矣一語而三致其丁寧焉是乃啓迪之要也彌者滿也充滿其性純乎一仁無有不足也馮翼孝德顒卭圭璋皆喻從游卷阿之多士復以鳯凰比成王百鳥比多士翽翽其羽雍雍喈喈皆謂百鳥蓋鳯凰所止百鳥從之鳥非一物故但舉其飛鳴之衆而已梧桐二木相類以子别之桐子小而圓梧子大而橢今蒼梧之桐其實長大而特甘知為梧矣民勞召穆公刺厲王也墨子荀子竝稱厲王染于虢公長父榮夷公終夫榮公之用芮良夫謂其好專利而不知大難知周室之必敗矣所謂詭隨則其人也所謂民勞謂困于繇役征輸之事也民困則貧貧則思亂故敢為姦宄不逞以延旦夕之命於是有强陵弱衆暴寡寇虐之禍所由起矣勢使之然也王今用汝為政存亡禍福之機甚𢎞且大我故進此大諫耳板凡伯刺厲王也爾雅訓板為僻謂王性僻繆政令乖戾下民盡被疾苦也苟能悔禍自咎改易所出之話而輯和其民謗議斯熄矣殿屎說文本作念㕧呻吟內痛之聲也如塤如篪喻天人之相應如璋如圭喻天人之合德如取如攜喻天人之相授受也人心所歸即天命之所在人心去則天命移矣警戒之詞也藩垣屏翰誨以求輔自助也敬天之怒誨以納諫改過保大命也出王猶言出往謂一動靜一語默天皆明察其得失而降禍福焉奈何不敬畏乎蕩召穆公傷周室大壞也厲王虐國人謗王王怒得衛巫使監謗者以告則殺之國人莫敢言道路以目召穆公故託為文王傷殷紂之亂以致詞蕩蕩者廣大含𢎞之貌非法度廢壞之說也彊禦掊克皆滔德者也炮烋猶言咆哮熊虎震怒殺物之聲也如蜩如螳喻在位者之謗議如沸如羮喻在下者之怨讟小大舉內外上下逺近而言也抑衛武公刺厲王亦以自警也其辭自警也其志則刺厲王也抑抑威儀即假樂所謂威儀抑抑以言厚自降挹謙虛以納規諫之益是乃進德之一隅也推而極之斯成全德矣靡哲不愚據自賢者而言也一挾自賢之心必且拂諫飾非無往而不愚矣惟聖罔念作狂此所謂哲人之愚也一曰敬慎威儀又曰敬爾威儀無不柔嘉又曰輯柔爾顔不遐有愆又曰淑慎爾止不愆于儀又曰告之話言順德之行又曰聽用我謀庶無大悔皆語其謙和受諫而去矜傲也彼童而角謂頑童之總角者伊訓所謂比頑童逺耆德是矣頑童之比耆德必逺此大足潰亂汝小子之國政猶投桃報李之必然也荏染猶言忍冉謂木性强忍而可屈者宜被絃以為弓人能溫恭下人者則必虛懷以成德桑柔芮伯刺厲王也芮伯者畿內諸侯為王卿士者所謂芮良夫也桑葉多隂行者每息其下喻宗周為四方小國所恃賴也今一朝傾覆猶桑未隕黃頓見捋采無復隂芘可望矣故次章曰靡國不泯又曰云徂何往明亂自京師禍及天下也填者積久之名愴恍填兮謂憂亂而中心不寧非一日矣四牡騤騤喻人心遑遽思避亂也國步蔑資言國運窮蹙無復四方援助之可資也為謀為毖謂謀國者毖密自私不咨訪于衆也誨爾序爵明當時在髙位者皆非其人也以匪人而當國政勢必引用阿私讒賊之徒猶執熱湯在前鮮不思濯其手也遡衝風而行者必唈僾而不前處亂世而仕者必失意而思退此稼穡所以維寶明仕之危不如農之安也鹿有長林豐草尚呼其類乃今朋友顧不相好而維譖害是用乎爾雅西風謂之泰風敗物之風也以此貪人唯聚斂是事雖大谷為之一空無論君子小人皆被其害然良人猶能用善道以自勉不順之人必發揚其隂賊而思畔矣今不用其良乃謂良人為悖何哉民之罔極言民心貪亂而難測者正由面是背非之人為民不利所致耳民既已回遹矣而又專力激成之遂使為盜為冦猶然詈我刺其凉薄即欲言我非有所刺然我實已為爾作此桑柔之歌矣雲漢仍叔美宣王也宣王承厲之烈內有撥亂之志遇災而懼側身修行欲銷去之天下喜於王化復行故美之也占候之術欲知當雨當視天漢有無雲氣若雲氣塞河漢者當雨候也暴有黑氣相逐于天漢中不出三日當雨矣此言雲漢昭回于天謂周歲之內河漢昭明未嘗有雲氣也久旱可知已昭回于天猶月令所謂星回于天也藴隆蟲蟲韓詩本作鬱隆炯炯謂鬱熱之氣炯炯然盛也寧俾我遁自疑非德而居尊位上違天心思遁去也庶正謂六官之長友紀則六官之副二僚屬也友紀之官散在奠瘞禋祀之所唯正卿兼該庶務所以鞫且疚也始言雲漢昭回于天終言有嘒其星是終其禱猶弗雨矣大命近止饑旱之極國將亡也無棄爾成圖再禱也嵩髙尹吉甫美宣王也何美乎美宣王之能封建諸侯也大封建大征伐大巡狩皆成周之盛典宣王能舉封建之典以封申伯是可美也唐虞之世姜姓實為四嶽之官嶽神享之降福于其子孫世為侯伯故曰維嶽降神生甫及申蓋申甫齊許皆姜姓也按郡國志南陽郡宛縣本申伯所封之國棘陽縣東北百里有謝城是即既入于謝之地也蒸民尹吉甫美宣王也仲山父為宣王卿士食采於樊時有城齊之役王命仲山甫董其事尹吉甫作此以送之民有耳目則能公視聽有心智則能别臧否故曰有物有則而民性之常莫不唯懿德是好若仲山甫之為卿士可謂有懿德者矣以後五章皆叙其懿德之實也柔嘉維則謂其髙明柔克以為法也愛莫助之言其德靡不舉無俟于助也城齊之事毛傳謂齊以邑居逼隘去薄姑而遷臨菑亦以土功大役皆禀王命明諸侯之宗周也韓奕尹吉甫美宣王也何美乎美其能錫命也韓之先為武王之子封國在涿郡方城縣宣王之時錫命為侯伯總領北方諸侯及百蠻故曰王錫韓侯其追其貃奄受北國因以其伯也貔羆皆猛獸白者貔黃者羆江漢尹吉甫美宣王也宣王命召穆公平淮夷而還錫命上公賜以圭瓉秬鬯故尹吉甫述其事而作是詩孔叢稱九命作伯乃有圭瓉秬鬯之賜考者成也古者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之祭器自成其名以祀其先祖是之謂考故曰作召公考常武召穆公美宣王也經文有奮武而無常武疑字誤耳南仲太祖毛鄭異義若謂命南仲于太祖之廟則文近躁蹙若謂南仲為皇父之太祖則文又迂復總之出車南仲與此南仲未詳時世同異邇日歙人吳元滿謂太祖是宜社造禰之祭謂使南仲尸之也文義似通瞻卭凡伯刺幽王也婦有長舌為厲之階謂褒姒譖申后廢太子事也有譖廢而後戎難興鞫人忮忒譖始竟背則長舌之實也商賈趨時若猛獸鷙鳥之發唯利是競故所營常獲三倍褒姒以婦人而秉商賈之心則何惡而不可為哉觱沸檻泉喻在下衆口之沸騰召旻凡伯刺幽王也篇末舉召公故名召旻所以異於小旻也瞻卬言亂自內作召旻言救亂非人坐見喪邦也蟊賊內訌謂褒姒潰潰回遹謂皇父家伯仲允棸子之徒也昏椓謂昏惑于王椓喪國本也潰茂猶言蕢茂吕覽所謂樹鬱則為蠹草鬱則為蕢此言歲旱則百草萎黃何能蕢茂喻民之遭亂憔悴無生意也米經春鑿粗者為糲精者為稗稗以喻賢人糲以喻回遹詩故卷九
