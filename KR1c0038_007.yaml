body:
  text: 詩故卷七明朱謀㙔撰小雅節南山家父刺幽王也何所刺之刺不平也曰尹氏大師託詞之婉也何以不平尊寵姻亞斥逺君子為政偏頗不均平也曰不平曰國均曰式夷曰不傭曰國成詩中凡七言之書曰無偏無頗遵王之義無黨無偏王道平平今也不均不平王道其謂何哉節彼南山維石巖巖言南山雖極崇高然有石為階級可履而登其上也師尹不均不平民畏其威卒無敢言之徒具瞻而已故我託詩以諷刺之也有實其猗實字蓋訛當作有石其猗言山石猗猗接引登履之人也方茂爾惡相爾矛矣謂幽王亦有加惡怒于小人之時若已將加矛戟其身矣然而包承之巧足以自解是以小人終不可去也小人不去君子不得而進矣正月大夫刺幽王也非大夫之刺也蓋申后太子之詞也曰念我獨兮哀我小心曰是以有侮曰民之無辜并其臣僕曰赫赫宗周褒姒滅之是非並后匹嫡榮枯異等哀痛慘怛者能為是言乎申侯犬戎謀攻幽王有成約矣幽王亦既聞之矣故曰民之訛言亦孔之將此詩褒姒滅之以上八章章各八句語意已盡終其永懷以下五章疑是錯簡于此以章皆六句不倫故也正月周之正月建子之月也繁霜猶易所謂履霜憂在堅氷者也因其有侮故怨毒生焉此召禍之本也瞻彼中林侯薪侯蒸謂林中雖有材木都無生意唯待斬伐而已喻周民死亡之迫也山本崇高今謂正如岡陵之卑可跨而越也以喻王室大亂可虜而亡也如此訛言可不知所懲乎局天蹐地畏禍也胡為虺蜴搆亂者也天夭是椓蔡雍傳引作夭夭與周南夭夭同義謂少好之赤子以貧困不養遂椓喪之也十月之交大夫刺幽王也何刺之刺其任皇父以卿士也輔相非人故災異迭見而一小人在位羣邪附之及其阽危將迫則又請城私邑徙民以實之唐志周正十月辛卯日食在幽王之六年鄭箋以為厲王者誤也厯法日食前後兩望月必當食彼月而微謂九月之望也此日而微則辛卯之朔也向在東都桓王與鄭人蘇忿生之田向盟州陘是也去西都千里而遙皇父恃寵請城規避戎禍土木繁興徙世家巨姓以實之人情懷土重遷傷其獨見搜括故賦此詩雨無正大夫刺幽王也曰雨無正字之誤也詩三百咸即詩語而名篇或取諸首關雎鵲巢之類是也或取諸終騶虞權輿之類是也或即篇中而取之庭燎巧言之類也或即其人與其事而命之巷伯賚般之類也或篇名偶同而分别之小明大明小旻召旻之類是也因是而求則大雅必有大宛大辨之篇今則亡矣曰常武者奮武之訛也曰雨無正者正大夫之訛也此即篇中之語命篇耳劉元城乃欲益以雨無其極傷我稼穡何其誕哉是蓋􅉏御之臣所作故曰曾我􅉏御憯憯日瘁夫正大夫以暨三事大夫邦君諸侯皆相率去位而違亂矣我欲勉留使還王都則拒我曰豫己未有室家在此矣泣血鼠竄無非疾苦之言也則詰之曰昔爾由王都而出居誰為爾作室乎昔既能作于彼今亦可作于此何得以無室而拒我哉小旻大夫刺幽王也曰小旻者小雅旻天之篇也何以刺乎刺謀國者顛倒是非臶至覆亡也幽王在位僅十一年詩以刺之者不一而足由夫婦父子之間大倫已斁設心處慮又何足觀此所謂謀亦黜申后登褒姒廢宜臼立伯服事耳國有大事雖集衆廷議亦唯回遹是從邇言是聽公論終莫遂也舍哲謀肅乂之士而唯小人是從將如流泉之決不復可收相與淪陷而已暴虎馮河固危道也謀之不善敗國亡家其禍尤烈故我用憂懼如臨淵履氷焉小宛大夫刺宣王也非刺宣也次在小旻小辨之間知亦幽王時詩也味其詞則兄弟相戒毋荒于酒教子義方求以免禍也鳴鳩古曰博榖今曰郭公季春始鳴旦暮刺天而飛未嘗栖止月令鳴鳩拂其羽者是也鷹化為鳩蓋即此物舉鳴鳩者明惡鳥化而為善喻人性無不可化之理也故曰念昔先人明發不寐勉於進修無忝爾祖可矣飲酒溫克進修之一事也各敬爾儀舉全德而言也菽莢善拆采菽者必乘晨露未晞之時則無遺脫喻教育者之宜早也蜾螺産卵于空穴之中必取桑蟲以嫗之喻教子者宜擇所師也脊令警悟兩相覺察唯恐或蹈畢弋喻兄弟砥礪以德求免禍也桑扈戴勝即今鸜鵒其性嗜肉又名竊脂率場啄粟違其性矣人不養之以學則天性謬戾勢必陷于刑辟卜以求免不亦晚乎握粟出卜細民事也管子稱庶神不格守龜不兆握粟而筮者屢中是已末章集木臨谷之戒正成德之事小辨刺幽王也孰刺之太子之傅刺之也鸒斯鵯鶋似烏小而多羣腹下白性不反哺好食禾麥即今所謂寒鴉也首上有毛卓起如辨故曰辨彼鸒斯詩言鸒斯多羣猶得叢食田野朝往夕還提提自適以喻小人冗食于國者甚不少也我何獨見斥逐而失所乎踧踧周道人所共由今則盡為茂草喻王廢棄彛倫之道不行也桑梓大葉多隂行者多趨其下以自芘若鞠躬然喻幽王獨不芘其子也鳴蜩依栁萑葦依淵異類相恃以為命我獨流離失所是以憂至不寐也鹿見逐則疾走然必數數反顧以俟其類雉羣集則分壟然必雊雊朝鳴以求其雌物各念族類也今玉獨如病木無復枝幹可持矣何以自立哉兔之投人人或脫之死於道路人或墐之皆惻隱不忍之心所感也王心奈何獨忍至此乎巧言刺幽王也何所刺疾讒也小辨志在感悟其親故微及信讒而已此則太子已廢追疾讒人而詰責之所謂讒人蓋褒姒也呼昊天而及父母知處父子之間也君子屢盟蓋與褒姒定盟約立其子也廢置大事安危攸繫如作寢廟者經營非一日定大猷者聚議非一人我之見廢我忖知其故矣由布置之術密造膝之謀深也荏染柔木太子自喻也往來行言喻讒也河濵土踈善陷彼何人而居河麋喻善陷人者也無拳無勇知非丈夫也既微且腫賤而惡之之詞也居徒幾何明其處袵席間無多人也皆斥褒姒也幽王廢嫡立庶嬖妾黜后以致父子相謀宗社覆滅自古禍亂莫甚于此仲尼録詩不一而足厥有由哉何人斯蘇公刺暴公也按左傳武王克商使諸侯撫封蘇忿生以溫為司冦桓王八年王以蘇忿生之田與鄭人是蘇公被讒失國當在平桓之際矣巷伯刺幽王也巷即永巷宫中道也巷伯者寺人之長篇內所稱寺人孟子者也寺人親近宫掖目擊褒姒之讒申后太子之廢故推本其集小過以成大釁如萋斐小文而成貝錦也天文箕主口舌以喻讒者驕人指褒姒勞人指申后暨太子呼蒼天使視之不平甚矣投諸豺虎有北而不受下所共惡也投畀有昊則謂大地無所復容矣楊園卑濕唯宜楊栁畝丘高畝可藝黍稷地有髙下故所藝有貴賤然楊園所植之物猗猗而長喻寺人雖賤言偶有中也內讒如是在朝君子可不圖所以拯救之乎谷風刺幽王也非刺幽也朋友相棄而相怨也春氣上升風自谷出謂之谷風草木乘此發生然其作也必繼之以隂雨甚則奮迅振掉傷殘草木者有之矣顧彼發生之德大傷殘之怨小也汝有患難恐懼則依據于我今者既安且寧遽以小怨而遂棄我如遺乎蓼莪刺幽王也非刺幽也孝子見放逐者所作也莪一名蘿即今蒔蘿菜之小而香者孝子自喻其幼時嘗見憐愛如莪也今者憎而見逐不啻若蒿之惡矣不敢怨望猶曰父母生我劬勞孝子不忍斥言也瓶罄罍耻喻子以不才放逐亦貽父母之辱也出則銜恤入則靡至放逐在外無所依託也山髙則多悲風人情危苦則多悲歎故以南山飄風悲厲喻已違養之苦凡民莫不善於事親我獨何故不善致不得終其養哉罍酒具也瓶汲具也瓶汲于井以濯罍瓶羸則罍無以潔故蒙耻耳大東刺亂也東國困於役而傷於財談大夫作此以告病也簋飱食之薄者棘匕物之微者言往昔朝周資斧之具不過如此君子循而行之小人目而擊之今唯貨賄是責勞役是供疲于奔命大異疇昔矣所以眷顧周道而出涕也王子晉曰古之君子其行至慎委積施關道路無限百姓恱之相將逺來視道如尺周道如砥之謂也穫薪樵蘇也蘇草刈而束之浸則腐敗喻小國單薄不堪過誅也仰視天漢呼天告困也跂彼織女之七襄求天代之輸布帛也所謂終日七襄者敏于織也古布帛匹長四十尺漢詩五日織一匹夫人故言遲七襄者成七尺也織女既不能代我之織牽牛不能代我轉輸南箕不能代我簸粟北斗不能代我挹酒我困終不可支矣四月大夫刺幽王也大東者東國困于征輸也四月者南國困于征輸也周正唯魯用之它國不能盡然故稱四月維夏六月徂暑耳觀江漢滔滔知其為南國也盡瘁以事知其困征輸也當夏則苦煩暑當秋則感凋零入冬則又苦風寒至于薇蕨之生是芳春矣人皆熙熙于豔陽我顧作歌以告哀是終歲四序無復須臾之歡矣利梅栗者蹂踐嘉草以喻利征輸者困苦良民也泉水數汲則竭而濁久之泉至而復清我力既屈豈有可伸之期乎北山大夫刺幽王也何刺乎刺為政者役使之不均也曰士子者上士中士下士之屬也北山極北之山苦寒之地胡虜域也杞謂枸杞今甘肅之杞最多疑即其所也曰四牡彭彭旅力方剛知防秋于北也杞實成于秋暮者也無將大車大夫悔將小人也非此之謂也周室大亂垂欲滅亡君子憂之無可奈何之詞也所謂百憂即兔爰之百罹百憂百凶也將負載之車者塵必及人思百憂者憂必傷人由禍亂已成勢不可救徒增鬱結而已小明大夫悔仕於亂世也非悔仕也蓋賢大夫被讒見放之詞也艽野則所放之地也淮南子言禽獸有艽又稱虎豹有茂草野彘有艽莦則知艽野非復人境矣穆天子所謂比徂西土爰居其野虎豹為羣烏鵲與處是已載離寒暑經兩歲也念彼共人在朝共事之臣也畏此罪罟王末豫環也嗟爾君子讒已者也靖共爾位誨以義也正直則神福之百祥矣欲其改前愆也不怨怒而顧教誨之忠厚至矣鼓鍾刺幽王也非刺幽也蓋記徐夷偃王僣亂之事也大雅曰率彼淮浦省此徐土鋪敦淮濆仍執醜虜宣王之世淮夷徐子嘗拒王命矣韓非稱徐偃王處漢東地方五百里行仁義割地而朝者三十六國荊文王滅之淮南鴻烈則稱陸地朝徐偃王者三十二國楚莊王滅之所記互異要知當在幽王之世矣曰鼓鍾曰伐鼛謂築宮室城隍之舉也曰琴瑟曰笙磬曰雅南謂其僭用周樂也君子聞此而悲幽王之不知懼也王維凝碧池頭奏管弦之感同是感矣詩故卷七
