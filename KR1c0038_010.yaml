body:
  text: 詩故卷十明朱謀㙔撰周頌清廟祀文王也成王營洛而作清廟以祀文武此其始奏之樂也洛誥稱王在新邑蒸祭歲文王騂牛一武王騂牛一而君牙之書曰丕顯哉文王謨丕承哉武王烈此言不顯不承其義一也知文武竝崇不獨祀文矣維天之命太平告文王也非也清廟之樂凡四章此則獻文之樂故曰於乎不顯文王之德之純維清則獻武之樂故曰文王之典尚纘述也烈文則祭禮既成而燕及助祭諸侯之樂也所謂維天之命於穆不已言天德也唯其命之不已故生生相繼文王之德之純言文德也唯其德純故誠一不二假以溢我左傳引作何以恤我設為問詞也駿惠我文王曾孫篤之則答詞也言能大順文德日篤不已則亦足以上合天德矣維清奏象舞也非也清廟之祭獻武王也武王伐紂反商之政天下清明由其能率文王之典而得天心故自肇禋以至成禮肅雍顯相一切奉戴于王實維周室之禎祥也烈文成王即政諸侯助祭也此序非也清廟禮成燕及助祭者而奏是詩也始言諸侯能來助祭濟濟趨事上洽天心以故錫此祉福而子孫保其無疆之惠是宜燕樂以勞之繼言王室所以崇貴諸侯之來助祭者為其能備四海九州之美味以致孝思非欲有所大費于汝之邦也汝當念此助祭錫福之功紹繼其美不廢斯禮可耳末又申言文武之德可訓可式而不可忘自宜來祭于周也天作祀先王先公也此追王太王而祀之之樂故著其開岐之功言自古昔以來天作岐山唯太王始能荒之荒之云者謂奄有之也太王既已作矣非有文王康安其民則亦無以成今日之王業故往者險阻之山今遂化為平易之道先王生養之澤深矣子孫可無求所以保之之道乎昊天有成命郊祀天地也叔向以為道成王之德是矣蓋祀成王之樂也宥則民懷其德密則民懷其刑懷德則仁昭矣懷刑則義立矣於此而殫其心新造之周所以安靜是守成之所當法者也我將祀文王於明堂也稱天知祀上帝也郊特牲而此稱牛羊知祀帝于明堂也古禮尚右天在右則文王在左知配享也文有典則以貽子孫我既師法文王昭事上帝以日靖乎四方天必錫文以嘏福而右饗之矣我又敢不畏天之威以保天命乎時邁巡狩告祭柴望也春岱嶽夏南嶽秋西嶽冬北嶽四時各以其方故曰時邁序天下之貴莫尊于有周故巡守之典自我行焉薄言震之謂發使告諸侯使來㑹行在所也莫不震疊謂諸侯聞來巡守懼以罪見罰黜內自震恐也百神河嶽省方之所有事也式序在位則班瑞于羣后也戢干戈櫜弓矢則武王時事也周官所謂九夏此則肆夏蓋取肆于時夏之語耳執競祀武王也非祀武也祀成王康王而推本於武王也毛傳泥序而稱不顯乎其成大功而安之則誤矣思文后稷配天也后稷播時百榖此獨舉來牟者月令麥為首種汜勝之農書亦稱田有六道麥為首種舉首種者以該其餘也大麥為牟小麥為來牟即麥聲之轉耳生民敷陳其詳此則約略其要雅頌之體則然也臣工諸侯助祭遣于廟也非此之謂也王者春省耕也臣工農官若周禮司稼之屬稱在公其所職也維莫之春戒毋後時也稱新畬著田野之日闢也庤具也錢鏄今世所謂銚鋤用以治新畬者也穫禾短鎌謂之銍奄觀銍艾以成功朂之明不徒勞也噫嘻春夏祈榖于上帝也非祈榖也實戒農官之詩也孔氏疏稱王者之立田官每三十里分為一部令一主田之吏主之其吏皆大夫為之十千為耦則萬夫也鄭箋謂萬夫之田方三十二里云三十里舉成數而言成王之世禮樂大備康王嗣位唯以務農富民為事矣振鷺二王之後來助祭也杞宋者夏商之後猶之三恪有客禮焉杞宋來朝則諸侯莫不具集振振而盛比之白鷺羣飛行列整肅威儀可尚也在彼無惡宜民宜人也在此無斁崇德象賢也庶幾夙夜以永終譽奬進之詞也苟能夙夜敦是道也得無永終其譽乎豐年秋冬報也禮有祈焉有報焉噫嘻祈也此則其報也月令孟春元日祈榖于上帝而不見報祀之舉豈即孟冬大割祠于公社及門閭臘先祖五祀勞農以休息之者乎其所謂報乎有瞽始作樂而合乎祖也禮春誦夏弦太師詔之瞽宗瞽精於聽者也故常命之典樂而肄樂之所謂之瞽宗曰有瞽有瞽在周之庭知周公作樂始肄之也作是樂也將以娛先祖之神而助祭之客來止有以示禮樂之大成焉濳季冬薦魚春獻鮪也月令季冬命漁師始漁天子親往乃嘗魚先薦寢廟季春薦鮪于寢廟此云濳有多魚知季冬薦魚之樂也西北牛羊多而魚鱉少故雅頌往往舉魚類之繁以著物之備耳雍禘太祖也非禘也武王克商歸祀于周廟邦甸侯衛駿奔走執豆籩之事此其樂章也皇考烈考皆謂文王也周公相成王乃尊諡文王而諱昌此云烈考又曰克昌厥後知為武王時詩也毛傳以烈考為武王誤矣載見諸侯始見乎武王廟也蓋非也有瞽始肄樂也雍則有事文廟諸侯助祭也此則祭禮告成諸侯咸來受命武王率之再見文考而頒爵于廟庭也介眉壽以下頌禱之辭也有客微子來見祖廟也非見祖廟也實微子之來朝周也萋且者包匭之盛多敦琢者玉帛之繁縟所謂旅者庭實旅百之物也淫大也威畏也知天命之靡常大懷畏懼故來朝周遂得助祭于廟而先王降以平格之福也武奏大武也周公相成王制禮作樂象武王伐紂之事作大武之樂孔子所謂武盡美矣未盡善者此也國語稱金奏肆夏樊遏渠天子以饗元侯肆夏則時邁也樊與繁通則雍也遏則此詩也所謂遏劉是矣閔豫小子嗣王朝於廟也成王免喪周公作此以啓誨于王勉之使法祖也非朝于廟也武王勝殷遏劉既已奄有天下今王嗣位撫綏為艱第須保有皇考之業永世克孝使無隕墜可耳然功莫大于武王德莫髙于文王苟能上法皇祖夙夜敬止以繼序前王庶足以守成矣訪落嗣王謀于廟也非謀於廟也成王述咨政所得而思所以率昭考也率時昭考則羣臣所以進語于王者未堪家多難蓋謂遺大投艱于已也紹庭上下陟降厥家則徘徊籌度所以圖治也敬之羣臣進戒嗣王也周公既作文王在上之詩以述文德所宜配天此則成王刺取其詩之要以自警也命不易哉天難忱也將謂奉持之以行也日就月將謂日有所近月有所行也唯能就而近之乃能將而行之此學之所以緝熙也小毖嗣王求助也非求助也蓋成王悔聽流言而迎復周公賦此以答鴟梟也荓蜂必得辛螫喻小人流言之當逺也桃蟲翻飛維鳥喻賢不肖名實之當辨也蓋物有蟲鳥區已别矣今聞桃蟲之名昧於物理者莫不疑以為蟲必覩其拚飛乃後知為鳥也人言可無詳審而輕信之乎說詩者未逹此㫖乃曰鷦鷯生鵰言始小而終大怪僻甚矣未堪家多難謂以幼沖而當遺大投艱之任也豫又集于蓼謂聽流言而捐棄聖輔自苦于治也載芟春籍田而祈社稷也此及良耜皆豳頌也實函斯活百榖既播含生意也有厭其傑苖氣充足傑然挺也綿綿其藨耘去稂莠宜及其早也周書綿綿不絶將尋斧柯是其義矣胡考猶言胡耉老人瘦露高結如垂胡也古文祖字通作且匪且有且謂非獨祖先之世為然也振古蓋謂后稷之時良耜秋報社稷也其笠伊糾結其繫笠之纓也其鏄斯趙鋭其刺耨之鋤也荼蓼一物紫色為荼青色為蓼百室百夫之室也十夫有溝百夫有洫千夫有澮萬夫有川此稱百室舉一洫之田為言也絲衣繹賔尸也按禮大夫冕而祭于公辨而祭于已士辨而祭于公冠而祭于己爵辨之服𤣥衣纁裳皆絲為之故曰絲衣非公祭不得頌故知絲衣載辨者士也正祭省牲視滌濯皆大夫典之此省牲視滌皆爵辨之士故知其為繹繹之為言尋也昨日祭已今日復祭也昨以為祖考今則為賔尸酌告成大武也武王克商述其武功為大武之樂此下四詩皆其樂章也酌即內則之勺蓋即鑠字之誤耳遵養時晦觀兵孟津而還也是用大介牧野之㑹友邦冡君咸來助也我寵受之受其來助之師也天命既集人心亦順故建此蹻蹻之武功今王嗣之而天下無異志者實由武王弔民伐罪而起無自私之心大見信于天下也桓講武類禡也非類禡也蓋述武王既克商而有天下也左氏稱周饑克殷而年豐此綏萬邦屢豐年是其事已于以四方克定厥家謂伐越戲方伐靡伐衛伐磨伐宣方伐蜀伐厲之類以是武功上昭于天故天命用集而代商以有天下也賚大封於廟也語稱周有大賚善人是富此蓋散鹿臺之財發巨橋之粟以大賚于商民也言我所以受天命而克商者皆由文王勤勞撫綏三分有二我但纘繹其緒而求所以大定耳是周之所以為周由乎仁及物也我敢不繹思其故而散此畜聚之財以賚善人乎般巡守而祀四嶽河海也此非巡守而祀也蓋克商之後列爵為五分土為三班瑞羣后改物革命也墮山喬嶽允猶翕河謂遣使以革命之故告山川也敷天之下裒時之對時周之命戒其順時恭命于周也魯頌駉頌僖公也駉為考牧之詩魯之大政也似非僖公所能辦蓋伯禽時事耳兖土宜牧今世猶然夫魯政多矣獨舉考牧一事軍國之所重也思無疆言經略之思無所不至也思無期言無限極之期也思無􅽡言無厭􅽡之心也思無邪本讀作徐言無怠緩之志也孔子引此以蔽三百用為邪正之邪斷章取義耳有駜頌僖公君臣之有道也非頌君臣也蓋諸侯相見燕㑹之詩也駜彼乘黃㑹同所駕之車也在公明明執禮以相見也振振鷺鼓咽咽樂舞之備也自今以始歲其有語能繼也君子有榖詒孫子以善相規也豈亦伯禽時詩乎泮水頌魯僖公能修泮宫也此詩盛言克服淮夷獻馘泮宫之事按左傳僖十六年冬公從齊侯㑹於淮而被執明年九月乃得釋歸不聞僖有伐淮夷之功也伐淮夷而得志者魯公伯禽耳事具費誓通典載魯郡泗水縣泮水出焉則知泮為水名魯侯作宫其上故曰泮宫漢儒妄受師說以為諸侯學宫曰泮宫失其實矣大賂廣賂也君及卿大夫皆有所賂是為大賂閟宫頌僖公能復周公之宇也此頌僖者頌之變也變則非正也何也魯周公之後禮樂之所自出也禮不王不禘而魯侯爵也乃曰皇皇后帝皇祖后稷是郊天而以后稷配也作者記之曰周公之孫莊公之子以著僭天子之禮樂自僖始也俗儒不逹經意乃稱成王以周公有大勳勞命魯公世祀周公以天子之禮樂祀帝于郊配以后稷不亦誣哉敦者治也治商之衆尚書所謂三千一心者也周公其首矣故但稱王曰叔父建爾元子省文也三壽上壽中壽下壽也三夀作朋謂并三等之壽而有之也黃髮台背壽胥與試若曰與彼黃髮台背之老試其强健也商頌那祀成湯也湯之功德偉矣宜在可述此詩獨舉鞉鼓管磬庸鼓之聲與萬舞之奕以及執事有恪者何哉商人尚聲聲之盛是德之盛也湯之功德自有大濩之樂此所謂聲蓋即大濩之聲耳自古在昔執事者恪以傳之雖助祭之賔聞此莫不夷懌則成湯來格綏我思成其可知矣烈祖祀中宗也中宗者湯之𤣥孫大戊也無逸稱中宗嚴恭寅畏天命自度治民祗懼不敢荒寧享國七十有五年殷道用以中興故號中宗申錫無疆中宗申錫之也及爾斯所所與王敬作所之所同謂致力以求治也既載清酤亦有和羮假無言時靡有爭所以交於神明之際也殷道尚質質生敬其於祭也一唯精誠之濳通不徒文物聲樂而已假至享獻溥廣將助也言諸侯八鸞鶬鶬來假以四海九州之美味來獻大有助於我受命主祭者故天神祖考享之而降福非謂於我受政教之命亦非自言受命之廣大若曰溥將我受命之人耳倒文法也𤣥鳥祀髙宗也髙宗者中宗𤣥孫之孫武丁也𤣥鳥降而生契毛傳以為髙辛率簡狄以春分𤣥鳥至之時祈郊禖而生契是矣吕氏春秋乃為𤣥鳥墮卵之說史遷述之以入殷紀中候契握從而和之鄭箋援緯以說經妄繆甚矣武丁孫子對先祖而言也武王靡所不勝者若伐荆楚克鬼方之屬也湯有景亳之命髙宗亦自河徂亳此云景員維河殷受命咸宜者舉湯暨髙宗㑹諸侯之地而言也員與云通語助詞長發大禘也此祭契暨相土以湯配之也昔舜之命契曰百姓不親五品不遜汝作司徒敬敷五教在寬故此詩曰受小國是達受大國是達率履不越明五教之達天下也契之孫曰相土蓋嗣為司徒益明其教不徒中夏率履雖海外四夷亦截然而向化厥後子孫世其封能恭帝命無所隕墜以至于湯而湯又能聖敬在躬昭假上帝而受命也玉之有聲者為球小球大球綴冕之圭也衮冕十有二旒前後各用玉百四十有四綴合旒玉以成衮冕以比聨合大國小國而成至尊也小共大共謂梁棟之間節梲大小不一皆以成室也爾雅臬之大者曰栱長者曰閣說文龎髙屋也此云駿厖謂髙大之屋也中葉謂相土以後成湯已前有震且業謂國緒中微震懼將危也殷武祀髙宗也髙宗武丁也易稱髙宗伐鬼方三年克之用力蓋亦勤矣鬼方即今貴州荆楚之尤阻險者荆楚既克諸侯咸來受命于商故曰勿豫禍適稼穡匪解言侯之靖恭厥職也不僣不濫不敢怠遑以言髙宗刑政之明黜陟有其道也此所以宜號髙宗者詩故卷十
