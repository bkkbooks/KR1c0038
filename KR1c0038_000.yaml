body:
  text: 詩故詩類提要臣等謹按詩故十卷明朱謀㙔撰謀㙔字鬱儀寧獻王七世孫以中尉攝石城王府事事迹具明史諸王傳中是書悉以小序首句為主略同蘇轍詩傳之例而參用舊説考證之大旨宗法漢學故與朱子集傳往往異同其以故為名意蓋有取也中間偶立異説如以小星為􅉏御入直以斯干為成王營洛周公所賦之類雖未免失之穿鑿然其學有根柢故參考互證往往能自出新意不為陳因蹈襲之論終非空言説經者所得而相擬矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f93a21ea7c72b3bf8d4898515cc5c3575cad9ed0a4bd6c802c878a18fa7cb6c5
