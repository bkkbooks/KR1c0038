body:
  text: 詩故詩類提要臣等謹按詩故十卷明朱謀㙔撰謀㙔字鬱儀寧獻王七世孫以中尉攝石城王府事事蹟具明史諸王傳中是書悉以小序首句為主畧同蘇轍詩傳之例而㕘用舊説攷證之大㫖宗法漢學故與朱子集傳往往異同其以故為名意葢有取也中間偶立異説如以小星為􅉏御入直以斯干為成王營洛周公所賦之類雖未免失之穿鑿然其學有根柢故參考互証往往能自出新意不為陳因蹈襲之論終非空言説經者所得而相擬矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7d1a3b2c903f96a439a017876f4efdddb356b086a11d4e0fe518c527edaf1e2a
