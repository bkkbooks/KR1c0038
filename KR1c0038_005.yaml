body:
  text: 詩故卷五明朱謀㙔撰陳宛丘刺幽公也始武王以元女大姬妻媯滿而封之于陳是為陳胡公大姬無子好巫覡禱祈鬼神歌舞之樂民俗化之五世而至幽公淫荒昏亂游蕩無度國人刺之然其習俗則有自來矣宛丘之下蓋禱祈之所擊缶擊鼓而舞鷺羽娛神也蓋若孫皓于巫梁武于佛矣東門之枌疾亂也何所疾疾男女之肆淫也始焉歌舞宛丘以娛神因而男女具集矣既而男女雜沓淫亂之志肆矣積習生常自宛丘而婆娑于市矣已則男女相狎而相取如攬在野之荍矣欲成而貽握椒使之慎言耳所謂市者亦非他有市也因南方之原來遊者衆故市肆具集而百貨陳焉今河北所謂趕集廣中所謂趂虛是也鬷本訓數謂往遊頻數不一而足也衡門誘僖公也非誘僖也遁世無悶之詞也門之邃者有阿孰堂宇此唯橫木為寄樞之用故曰衡門泌本作淠水名也非泉也說文淠水出汝南弋陽垂山東入于淮洋洋水盛貌淠水廣大自有嘉魚可食豈必河之魴鯉而後樂饑取妻可矣豈必齊姜宋子而後適意皆寡欲無求之詞也東門之池刺時也何刺乎刺賢而遁世不見用也有衡門之遁而後有是詩焉水經注稱陳城東門內有池水至清潔而不耗竭即此池矣漚者漸也楚人曰漚齊人曰涹麻必漸者使之柔韌可績耳東門之楊刺時也何所刺之刺淫奔也東門有池固宜楊栁其葉牂牂而盛肺肺然而垂則向春之末迎夏之陽矣游者於此邂逅期以初昏相奔已而明星煌煌負約不至非謂親迎之際女有它志而愆期也墓門刺陳他也陳他無良師傅以至不義殺太子免而代之以亂陳國也墓門隧道之所唯無人焉故棘得而生之梟得而萃之他唯無良師傅故得肆於惡棘之防道無不斯之理梟之既萃無不彈之勢以喻他之弒逆終必見討悔無所及矣陳人蓋知他之逆謀已成猶未動于惡故賦此諷之防有鵲巢憂讒賊也憂宣公之信讒也味其義非憂宣也蓋靈公私于夏姬憂其有所間阻也水隄曰防陵霄曰苕鵲巢于木不于防苕生于下濕不于丘誰為此言以侜惑我之所美致生間阻使我忉忉而憂乎說文訓隄為唐中唐謂唐中非甓所也鷊謂綬草亦生下濕非卭之所産也月出刺好色也何所刺刺靈公也靈公通于夏姬蓋嘗夜中微行往就之覬國人不我知也佼人謂靈公窈糾懮受夭紹皆微行濳蔽之狀公欲隱其迹而人顯言之明穢行之不可掩也株林刺靈公也始焉淫于夏姬猶有愧心故月中微行久之狎習則車焉驅而就之矣禮義大防既決弒逆之禍必至故作者直斥其事也澤陂刺時也非刺也傷泄冶之見殺也靈公淫于夏姬泄冶以為君臣宣淫民無效焉靈公殺之澤之有陂以防淫泆蒲與荷蕳皆芳潔挺直不屈之物喻泄冶之能以禮諫君也傷如之何悲其死也寤寐涕泗追惜之也卷與鬈同碩大且卷碩大且儼則方正剛毅之氣可想見矣檜妘姓祝融氏後周武王之所封國于溱洧之間後為鄭武公所并羔裘大夫以道去其君也史伯謂鄭桓公曰濟洛河潁之間子男之國虢鄶為大虢叔恃勢鄶仲恃險皆有驕侈怠慢之心加之以貪冒皆可取也鄶之為鄶可知矣羔裘謂鄶大夫狐裘則其君也有所恃而驕慢宜其逍遙翺翔無警戒之心賢者知其必亡故憂而去之素冠刺不能三年也按縞素誠喪服矣然而孔子素衣麑裘許子冠素玉藻君韠朱大夫素士爵韋冠禮三王共皮辨素積緇帶素韠未見素冠素韠獨為既祥之服也設果刺不三年胡為舍衰麻齊斬而唯素冠素韠是思哉古者平時無事則服素戎事則否是蓋厭苦戎馬者思得息肩之詞耳棘者急也介胄之士衣裝必急欒欒猶曰攣如拘束之貌也隰有萇楚疾恣也非疾恣也傷鄶之垂亡而君不悟也萇楚羊桃枝莖柔弱引蔓草上不能自立喻鄶君怠荒􅀈玩馴至亡國不知自謀也匪風思周道也非思周道也鄭人逼鄶王室微弱無所控告追思西周之政不可復得也大風迅發行者遡之多至辟易車馬疾驅乘者雖逸多至怔忡今非風發也非車馳也而人心忡忡失常則以亡在旦夕無復有可恃賴耳北方魚少而貴故舉魚以為大烹曹蜉蝣刺奢也非刺奢也刺不知所務也曹在禹貢兖州之北漢之濟隂定陶是已青兖之俗工絲枲故齊紈魯縞之名滿天下曹處其間習其俗而加工巧焉舉皆衣裳楚楚以相夸曹小國也不知務農講武而纎縞是尚譬諸蜉蝣之羽朝生暮死而已我將何所歸宿乎憂其淪亡之詞也夏小正五月浮游有殷此物伏柱礎間食木成穴久之生翼掘穴而出千百交飛尋亦墮地而死所謂飛蟻者也掘閲猶言掘穴管子稱掘閲得玉古語云然郭璞陸璣謂蜉蝣為有角甲蟲炙之可啖者誤矣候人刺近小人也小人尸位君子必見棄矣荷戈祋者候人職也三百者勉强之詞以是人而强授赤芾使備大夫蓋若更始爛羊胃騎都尉事矣晉文公數曹共公不用僖負羇而乘軒者三百人亦左氏誤釋詩義而附㑹之耳鵜之在梁勢必濡首以漁喻小人在位必肆貪殘安得不遂其所求哉朝雨既霽虹霓西見薈蔚瑣瑣之物莫不光豔得遂喻候人受赤芾之寵也季女婉變顧常饑餒喻君子之困窮也鳲鳩刺不一也非刺不一也美公子欣時之一其德也曹宣公卒公子負芻弒太子而自立欣時不義之也將出奔焉國人聞之亦將相率以從負芻懼自告厥罪請留子臧子臧反而致其邑明年諸侯盟于戚執負芻以歸將立子臧子臧固辭遂奔宋曹人請于晉曰若之何亡曹國之鎮公子乎晉人反之子臧盡致其邑與卿終身不仕事具左傳帶用素絲辨用綦玉卿大夫服也其帶伊絲其辨伊騏著其章也覩其章則知其為子臧矣鳲鳩秸鞠性嗜桑椹月令所謂戴勝降于桑者也始生山中數十為羣來集桑上其聲秸秸鞠鞠此鳥知椹甘美常在桑間其子則六七遷徙于他樹喻它人或為富貴移志子臧則守義不變足以正四國也梅也棘也榛也皆其子所遷之木非謂鳩有七子也下泉思治也泉在井者謂之下泉易稱井冽寒泉食是也冽然寒泉宜以食人今顧以浸苞稂之屬費有用之財養無益之物民窮力困征誅不已由無明王在上慶賞黜陟以正四國耳故思昔時郇伯勞徠四方諸侯有所忌憚而不敢肆傷今之不然也豳七月周公陳王業也周之王業始造于豳無非農桑狩獵之務衣食厚生之原先事教戒不違其時上以誠撫下下以誠事上如是而已矣太王之時已自改朔故於十月而申命之曰嗟我婦子曰為改歲而建子之月則稱一之日也倉庚青鳥司啓者也以春分鳴今之百舌鳥也傳以為離黃則誤矣采繁謂采皤蒿以薦新感雨露之既濡而興悲非欲嫁也七月鳴鵙月令所謂仲夏鵙始鳴反舌無聲者也四月莠葽謂逺志也此草微小而善延蔓僅可充藥必舉是者明勾萌庶物至此無不達也斯螽蜤螽爾雅所謂蜙蝑今世所謂蚱蜢者也動股言躍也莎雞今之絡緯以股鳴者蟋蟀今之促織以翼鳴者鬱薁今之葡萄豳土所宜者葉大多隂故謂之鬱鬱小者曰薁俱佳果也瓜即甘瓠壺則苦匏瓜以佐饌壺以涉水鶡冠所謂中流失船一壺千金是已黍稷重穋舉黍稷早晚之種言之也禾麻菽麥該五榖而言之也獻羔祭韭是仲春之禴祭非為開氷也氷以去暑仲春猶寒何得便用氷乎申豐之說亦誤釋詩而附㑹之耳鴟梟周公救亂也鴟梟惡鳥常攫鳥子而食云撤桑土而綢繆牖戶則謂鵲巢矣鴟梟以喻武庚鳥子以喻管蔡鵲巢則喻王室也恩斯其子也勤斯其室也桑土桑根之浮生土面者毛傳訓荼為萑薍之苕韓詩訓租為積風雨漂搖喻流言之惑成王也豫維音嘵嘵正明作詩以貽成王之意也東山周公東征也非始征也東征而還勞歸士也岐周在西故謂三監之地為東山慆慆訓久在東三年故云久也蠋蠶屬自能作繭蜎蜎屈申貌蠋在桑野作繭喻征夫無家自制裳衣而歸也伊威長角長股背窿而短斑色有文常依室中隈奧而生今俗謂之濳駝非鼠婦也熠耀宵行謂螢也夜中見光不見螢故曰熠耀非有所謂如蠶之蟲也鸛善瞻視四逺無人乃下取食今鳴于垤虛寂可知非為隂雨非為食蟻也瓜苦苦葉之匏也栗韓詩作訓衆也親結其縭解其父母所結女子之縭也天一地二數之始也天九地十數之終也隂陽男女配合相成故曰九十其儀破斧美周公也非美也西歸之士答東山也隋銎曰斧方銎曰斨皆析薪之具唯銎孔異耳釡之有足者曰錡無足者曰銶皆炊食之具非鑿屬也錡之為釜既見采蘋銶雖無訓可以類求矣斧斨錡銶之破缺明從役在東之久也四國謂殷東徐奄熊盈之屬欲匡正之使化于義固王室也乃今念我勞苦賦詩慰之其恩德亦何大且美哉伐柯美周公也非美周公也周公將歸貽詩二公也周公以避流言居東二年適有風雷之變成王啓金縢而得周公請以身代武王之說二公及王問諸史與百執事而信焉王乃迎公夫金縢之事史與百執事皆得而知之二公豈不知而待問乎蓋以堅王之信也調劑啓迪之間二公之力多矣故周公將歸而賦此詒之伐柯伐柯喻用力之勤取妻媒克喻調劑之善其則不逺喻已當與二公同朝互相師法以成治化也籩豆有踐謂得相聚同燕好也九罭美周公也非美也東人送周公之詞也周公始避流言武服即戎至是成王感悟以衮繡上公之服迎之故曰我覯之子衮衣繡裳故曰是以有衮衣兮託為創見之詞也九罭魚網之多囊者所以致魚使不得逸也九罭之求鱒魴喻衮繡上公之服迎周公也所者用力之詞公歸無所言易於歸也狼跋美周公也非徒美也二公答伐柯也狼之為物大口細腰每殺一物隨啖而盡一皆聚之胡中纍纍然重徐步而反齝之當其行也常恐跋胡而跲尾以貪殘而致纍耳小人患得患失之憂何以異此周公大不然矣昔以流言去位無愠容今以上公迎還無喜色東征克亂之功一切歸之戰士而不自居其度量廣大謙抑恭謹何如哉赤舄者衮繡之一物舉赤舄而衮繡可知焉詩故卷五
