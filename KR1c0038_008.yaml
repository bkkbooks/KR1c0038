body:
  text: 詩故卷八明朱謀㙔撰小雅楚茨刺幽王也非刺幽也實豳雅也后稷教民稼穡至于古公亶父世修其業以身率民此蓋序其治公田以供祭享之事也祭必先粢盛與酒醴非藝黍稷則粢盛酒醴何所從出哉楚楚整勑貌茨謂編茅茨以覆田舍非蒺藜也抽棘以為田舍之藩非除蒺藜與棘也自昔為此田舍正以藝黍稷故耳記稱大夫濟濟士蹌蹌此云濟濟蹌蹌知豳公之祭先公也近火而熟者謂之燔逺火而熟者謂之炙所燔者肉也所炙者肝也神保者先祖神靈之所保蓋攝尸者之嘉號我孔熯矣熯之訓敬毛傳為優也説文訓熯為乾亦君子終日乾乾之意耳如幾者如所􅠟望也如式者如所擬度也是皆百福之賚孝孫者也降福既已齊備又且稷速而不遲既已匡其所不逮又且勑其所未戒極億萬年而無替廢也信南山刺幽王也非刺幽也亦豳雅也楚茨因祭祀而推原粢盛所自出此詩則因力田而成祭享之禮也信彼南山維禹甸之謂后稷教民稼穡夏禹表南山而封之有邰子孫世修其業因其原隰高下而疆理之盡地利矣又能上協天時雨雪霑足故得黍稷彧彧然盛也少牢饋食之禮宿尸之明日主人朝服視殺司馬刲羊司士擊豕宗人告備乃退雍人陳鼎于羊豕之西升胖以及腸既實鼎司宫筵于奧祝設几于筵上主人出迎鼎今曰取其血膋則視殺以至迎鼎時事也甫田刺幽王也非刺幽也先公勸農之詩也甫田大田也孫無撓言北方謂麥田曰小田種黍稷者曰大田方里而井四井為邑四邑為丘四丘為甸四甸為縣一井之地為田九百畝一邑為田三千六百畝一丘為田一萬四千四百畝一甸為田五萬七千六百畝一縣為田二十三萬一千畝歲取十千舉一縣而言十萬而取萬是徹法也介者間也勸農之暇相其秀民而進之語使就學也北方地高少水常苦于旱故祈甘雨大田刺幽王也非刺幽也農夫答甫田之詞也螟即螟蛉之螟食葉青蟲也螣説文作蓋螟類之尤大者蟊賊謂蝗也螟螣自內生蟊賊自外至淹與黤同謂隂氣之蔽日者興雨呂覽漢志並作興雲祁祁舒徐貌韓奕所謂祁祁如雲是已雨我公田則雲者為雨矣雲可言興雨則降矣云興雨者誤也瞻彼洛矣刺幽王也非刺幽也蓋成康之世巡于東都之詩也為其時莫可必故次于豳雅之後以著王業由先公務農而後成也天子出巡必因狩獵講武故曰韎韐有奭以作六師巡狩東都諸侯畢會方國道里逺近均平故曰洛水泱泱謂得中央之勢也此朝會諸侯之所作故曰福祿如茨君子萬年詞兼頌禱有如此如茨謂福祿比密如屋之覆茨無所漏也韎者赤色韐者韋韠戎事之服鄢陵之戰楚子所謂韎韋之跗注者是也裳裳者華刺幽王也非刺幽也天子答瞻彼洛矣之詞也裳裳者華謂華之繁盛好下垂者疑即今所謂棣棠迎春栁之類以其好下故曰裳裳其葉光澤故曰湑兮此華正視則黃覆視則白故曰或黃或白喻諸侯恭敬有光儀也白馬黑鬛曰駱夏后氏所尚之焉謂把子也把宋者夏商之後舉把以該諸侯耳左之左之無不宜之謂諸侯率職來朝唯王命之是聽也桑扈刺幽王也非刺幽也諸侯時見于天子天子燕之之詞也桑扈戴勝季春來降于桑交交羣鳴應候而至喻諸侯時見不違禮也鶯與瑩通謂其毛羽光澤非文章之説也不戢不難謂其恭儉有節不難于不戢斂也引兕觥而釂旨酒常思柔克以將之未嘗有驕敖之色此萬福所以不求而自至鴛鴦刺幽王也非刺幽也諸侯答桑扈之詞也鴛鴦之鳥交翼並栖羅者往往一舉而兩得之以喻王之福祿輻輳不偏至也古者四馬駕一車謂之一乘故曰乘馬云乘馬在廄喻王福祿之備具也頍辨諸公刺幽王也非刺幽也王者燕親戚諸侯而諸侯歌其事也周禮玄冠以燕羣臣皮辨以燕兄弟頍許氏説文作即古規字規為圓者辨之貌也蔦與猶言猗與那與狀女蘿之輕眇也女蘿輕眇而託松柏喻已得託親戚于王也雨雪維霰班白之喻也因覩頍辨覺華髮之在首知老死之漸至典禮有常期燕私有紀極雖兄弟甥舅之密親不能數數與言笑也今日之飲王故欲極其歡耳車舝大夫刺幽王也非刺幽也天子答頍辨也車恃輪以運輪恃軸以立軸恃舝以進止舝者車軸兩頭上所關鐵也車舝間關有聲語其逺來之勞憊季女婉孌語其威儀之謹嚴及既相接莫非德音匪但慰我飢渴而已即是勞苦謹嚴已當燕勞之况復德音之好友乎鷮雉屬之最健者尾長六尺武人用以插冠示勇健也鷮集平林喻其有武備也令德來教語其有文事也山脊曰岡大陸曰阜柞木堅忍宜阜者也今陟高岡而柝柞薪喻希有之覯也高山仰止喻其德可師法也景行行止語其順大道也爾若四牡六轡數肯來此以慰我心又何老死之足憂乎青蠅大夫刺幽王也非刺幽也諷王勿近小人也蠅類有二一青一蒼蒼蠅能乳卵于爼豆中青蠅唯善汚點潔白之物營營青蠅鳴飛求入之貌語此點白為黑之蠅當驅而逺之使止樊籬榛棘間可也若使近人則必汚穢飲食變白為黑矣其讒譖之言寧足聽乎賔之初筵衛武公刺時也非刺時也燕大賔客歌此以諷荒于酒者使之進德也酒之為物亂性靈助凶德益疾病長嗜欲者也故禹惡旨酒湯戒甘酒文誥彞酒先王制禮一獻之間賔主百拜終日飲酒而不得醉焉所以備酒禍也鄉射揖讓而升下而飲以酒示罰也此言發彼有的以祈爾爵明不以飲為榮也三爵不識矧敢多又約飲之至也籥舞一章內有蒸衎烈祖子孫其湛之語與射侯祈爵似非倫類疑是由儀等詩逸篇因句法偶同竄入于此魚藻刺幽王也非刺幽也朱仲晦所謂天子燕諸侯而諸侯美天子之詩也蓱藻者魚之所芘網罟之所不加處也故水靜止則蓱藻生焉魚養于此乘流噞波數見其首數掉其尾至逸樂也喻已奉戴王政各得其所侍燕樂于鎬京焉采菽刺幽王也非刺幽也天子答魚藻也古者燕享之禮必賦詩道意叔孫穆叔所謂三夏天子所以享元侯也文王兩君相見之樂也鹿鳴君所以嘉寡君也四牡君所以勞使臣也是詩之用于燕也秦穆公燕晉公子重耳賦采菽公子賦黍苖是采菽之為天子命諸侯以命服之樂也采菽者懼或遺失必盛之以筐筥諸侯來朝懼或簡禮必錫之以車焉章服檻泉泉之阻于石檻觱沸有聲若觱栗然者喻車聲嘒嘒而來響不輟也柞木枝幹繁盛其性堅韌足以相載非若他木柔脆枝末大則披其本矣喻諸侯秉德守禮鎮撫王室而能來朝不驕蹇也紼纚皆維舟之索大曰紼小者曰纚舟有大有小故繫維之具亦有紼有纚喻諸侯五等有崇有卑而賚豫之典有厚有薄也角弓父兄刺幽王也非刺幽也蓋厲王時詩也天子於同姓諸侯稱伯父叔父稱兄弟於異姓則稱舅父稱昏姻此蓋諷王聨屬諸侯之詞角弓堅徑弭恆外向引而內其弭則足以威疆禦喻兄弟昏姻之國易以踈逺聨而親之則足以威不庭也綽綽有裕言能相容忍也交相為愈言能相蟊賊也相怨一方兄弟乖戾出亡在外也求其禍端非有大故祗以巵酒未讓而生瞋恨耳甚言怨不在大也老馬識道引駒而行數數反顧恐其失路也王為諸侯宗主可不顧其後乎如恣口腹而飲食則有醉飽之失矣由其不顧後患故也猱即夒也亦名沐猴人或羈紲之以為弄具猱善升木不待教而能如以塗附於塗理勢必墜喻人情難合而易離貴乎聨屬者之有道則小人斯附屬之矣雨雪見日則消喻薄道之難自久也莫肯下遺謂王不肯下撫親戚也式居婁驕謂屢用驕矜自居也戎狄貪而無親今王用其道故我用憂菀栁刺幽王也按楚世家夷王之時王室始微諸侯相伐熊渠與其三子皆僭稱王及厲王暴虐熊渠畏其伐楚遂去其號強楚畏厲如此則它諸侯可知矣是蓋厲王時詩也菀栁喻王室本以芘覆為德今則暴虐甚可憂悼不敢往朝懼其誅求無極也蹈鄭箋作悼於義乃通鳥雖高飛傅天而止王心貪狠不知所極若或往朝但有凶危可矜之禍而已相戒之甚也蓋有角弓之諷而後有菀栁之詩矣都人士周人刺衣服無常也非刺衣服無常也蓋厲王暴虐而流死于彘周室無王禮樂崩壞文物墜失君子傷焉因思昔日都邑之盛也黃衣狐裘諸侯之服行歸于周自其國來朝于王也諸侯來王萬民是則無不宗周矣臺笠緇撮羅氏之冠也素錦綢杠旗幩之竿也羅氏天子掌鳥獸者也諸侯之貢咸屬焉草笠而至尊野服也綢直如髮旗徽之密以喻車服之盛也舉臺笠以言諸侯之來貢舉綢杠以言諸侯之女之來嬪充耳琇實公卿之服也謂之尹姞公卿之女也尹即吉甫之先姞即蹶父之先以衣涉水曰厲垂帶而厲謂庶士也施膏澤則卷髮如蠆謂庶女也末章申言士女之容儀以括前四章不盡之意采緑刺怒曠也非刺也召伯勞南行之士也前二章代其妻述未歸時事後二章則述已歸時事豫髮曲局語不膏沐也六日不詹語不盥浴也古者五日則燂湯請浴故曰五日為期心有所懷故六日不詹耳詹與煔通即燂字也韔弓綸繩以職其勞親愛之意也黍苗刺幽王也非刺幽也南行之士答采緑也召伯營謝事具大雅嵩髙之篇原隰既平泉流既清即所謂徹申伯土疆以峙其粻也因其篇章短小故附之小雅隰桑刺幽王也非刺幽也蓋惜賢者之遁世也桑以飼蠶宜植宅畔今云隰桑則處下隰之地去人逺矣以其不復見采故深歎惜之我若得見是人樂可知己末章設為自詰之詞言心既誠愛此賢何不以告其君使徴聘之典行徒中心藏此誠愛何日忘之乎白華周人刺幽后也所謂幽后則褒姒也此蓋申后見廢之後所作菅茅雖無絲麻之美亦有纒束之用王獨棄我曽二物之不若矣又言菅茅雖賤均受雨露之澤天步無微不及若甚艱矣王澤何獨偏乎水性皆趨東南今以稻田需澤激池水使之北流喻惠澤之曲施于物也王心獨不然矣桑木堅韌宜車今用為薪枉其材矣喻已見廢非理也鼓鐘聞外明已之枉天下共聞也鶖惡而貪以喻褒姒鶴潔而亷以自喻也鴛央雌雄一德死不相背王顧二三其德矣乘石巍然數級髙與車等王者履之以升車此云扁石卑薄之石也豈足履乎喻褒姒之卑賤不足寵也綿蠻微臣刺亂也周之盛時每有遣使往還必宴勞之四牡皇華出車枤杜所以作也及其衰也士之從役者則憚道逺而飲食是憂大夫之所燕者瓠葉與兔首而已禮意衰薄世道可知矣瓠葉大夫刺幽王也説見綿蠻夫藜藿之食已至薄矣今乃至烹瓠葉則尤薄惡不中食也禮有兔羮兔醢不聞兔首今乃至用兔首饗賔荒簡甚矣典禮廢墜故也漸漸之石下國刺幽王也武人東征小序以為征荆舒也漸漸之石蓋積石孟門之險東征所由出也􅘻豕四􅤲皆白性好負塗故其白常隱今以行潦滌其汚泥故見白􅤲知征夫之苦雨矣而月又離于畢將復雨焉憂沾濡之不暇何心制敵哉在上者能恤人勞苦而慰拊之則在下者忘其勞苦此詩自述勞苦則在上者不能恤拊其下可知矣苕之華大夫閔時也何閔乎閔西周之將亡也苕華蔓生直上一名陵霄其華紫赤將落則色變而黃今曰藝其黃矣將落之候喻周室亂極勢必亡也羊墳其首山無草也三星在罶水無魚也人食鮮飽飢饉甚也天下將亂必先飢饉而後戎馬是生焉何草不黃下國刺幽王也幽王之世鮮所征伐此蓋王恱褒姒數舉烽火以召諸侯之師至則無寇而罷故諸侯之見役者怨苦之而賦此詩詩故卷八
