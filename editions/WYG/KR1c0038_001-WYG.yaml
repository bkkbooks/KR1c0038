  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0038_WYG_001-1a, image: WYG0079/WYG0079-0550a.png}
body:
  text: 詩故卷一明朱謀㙔撰周南者何岐周之風也詩六義有風雅頌而無南此何以稱南風之南也八風寒燠異徳升降殊情不為振掉則為凄戾唯南風祥和鬯達長養萬物有豈樂而無怫鬱文王岐周之化實象之故不稱風而稱南也召公分陜矣何以稱南其化同也造王業之本莫如周南成王業之效莫如召南故大胥鼓南而鼓鐘以雅以南有㫖哉闗雎后妃之徳也何以言徳廣嬪御厚國本也國本莫重于嗣續婦徳莫難于不妬太姒能求庶女於窈窕側陋之間廣為則百斯男之地厥徳又何加焉雎鳩王雎亦謂之鶚大小如鴟深目目上骨露幽州名之曰鷲亦名白鷢不類鳬鷖也此鳥鷙而善漁每得隈潭隩渚輙盤飛雲際哀鳴求類而後下集焉非為其有别也窈窕猶言䆗窱謂窮巷深閨淑女之所在非幽閒貞静之説也荇菜葉紫莖白脆美可茹其葉始卷而漸開黄花六出今人不復采取第名之曰豬蓴闗雎一詩初非難説而毛韓齊魯各立異義良由辨物未明比興失所守師説者愈精愈逺愈索愈疎三百五篇用是不復得其故矣葛覃后妃之本也何以言本内教之所由立也太姒位乎正嫡廣求庶妾並處宫中不有所以教之得無安于怠荒乎蠶桑者后夫人之所有事而葛枲細務則庶婦之職也太姒身率絺綌服之無斁蠶桑可知矣言告師氏太姒自寧其親也薄汚薄澣歸寧父母語庶妾也示之勤儉教之孝思非政本乎萋萋狀葛之始苗莫莫狀葛之成就莫莫云者誕節之謂非茂密也私者親體之衵服衣則洩暑之常衣非燕服褘衣之謂也卷耳后妃之志也何志乎志逺人也丈夫有事四方無所庸憂文王則患在羑里禍有靡測是以徬徨不安永懐無已耳序乃謂求賢審官不幾侵公事已乎樛木后妃逮下也何逮乎能以恩意接下使不自塞也上之臨下志于威嚴則其情不通志于妬忌則其生不遂能忠能恕上下泰然樂可知矣葛生山谷間附木而起長二三丈藟亦葛類又名巨苽本草所謂千歳藟也葛藟得託樛木以遂其生比庶妾因后妃而進御所謂樂只福履則頌禱之詞耳螽斯后妃子孫衆多也非也衆妾相安相樂之詞也螽類有五在爾雅此土螽也其種獨蕃秋冬之際千百為羣飛集田野絶不相害非以股鳴者振振言其衆盛非仁厚之謂桃夭后妃之所致也非也后妃荅樛木也凡木美實者未必美華即華美矣不能早實唯桃華豐豔三年以上便能作實以比衆妾年少色好又宜子也大學傳曰宜其家人而後可以教國人非君夫人能教國乎兔罝后妃之化也非也文王之化也文治于岐四方無侮寢甲止戈武夫無所效其用相與優㳺田野從事罝罔以銷磨其壯心焉曰干城曰好仇曰腹心計其才也以此才而野處若深惜之實為國家治平喜矣兔道為迒往來有常所謂中逵自是兔迒非九達之逵也芣苢后妃之美也非也周民室家樂完聚也無征戍則民安其業室家無復離析死亡之憂所當恤者産難而已采芣苢宜産也治平之象溢於言表矣此其所以為風乎漢廣徳廣所及也孰及之文徳及之也岐周處西北而江漢實在其南文徳被乎南國南國之君思欲奉戴猶畏紂之暴虐有不敢先賦此以見志曰喬木曰㳺女喻文徳之可歆豔非犯禮妄求之説也錯薪也楚也蔞也皆可刈之物也以錯薪翹翹秀起姑欲待其黄落但刈楚及蔞而已喻惜名分不欲先去紂也孰能先我歸周我當秣其馬而從其後矣汝墳道化行也曷行之行東諸侯也東諸侯服文徳而朝周者必由汝墳而西故遵汝墳者往見伐其條枚今則伐其條肄計已經年而始一來感其聘問之曠也既見君子不以曠而棄我又私喜矣唯是王室虐􅆋如燬不遑寧息故有曠也敢貳心哉文王三分天下有二於漢廣汝墳而見之言婦人能閔君子者何足以語此楚人謂火曰燥吳人曰􅛚齊人曰燬此稱王室如燬則齊語矣故知為東諸侯之詞麟之趾闗雎之應也曷應之成王業者應之也周南闗雎以至桃夭家之齊兔罝芣苢國之治漢廣汝墳則天下其將平矣然而大統未集文王即世向非武王周公繼述厥志王業何由而成乎麟神物也世不槩有以比公子公孫不世出之賢聖耳曰子曰孫曰族舉皆賢聖非一故稱振振召南鵲巢夫人之徳也夫人始來于何見徳乎于其能將姪娣俱來也古者諸侯一娶九女二國媵之以姪娣是嘗有挾忌心不與姪娣偕行者矣此夫人獨能將之故作者樂歌其事焉鵲工為巢綢繆鞏固喻君夫人有國有家鳩拙於巢或託鵲巢而乳子則姪娣自喻也傳謂鳲鳩均壹之徳以比夫人殆不然哉采蘩夫人不失職也何以不失職祀以其時也祭有禴有烝烝以進品物禴以薦新味南國歳味莫先于蘩孟春芽始數寸香脆可珍碧葉白㲨故謂皤蒿物雖微而敬薦之可謂能修常事矣被者祭服之通名少牢饋食主婦被裼衣侈袂薦自東房是其事也傳以被為首飾箋又改被為髲何其鑿邪草蟲大夫妻能以禮自防也夫婦一體也逺離之久感時相念情之正也何必謂其以禮自防乎草蟲者蜻蛚寒螿之總名張衡所謂大火流草蟲鳴是已阜螽即周南所謂螽斯也草蟲喓喓阜螽趯趯深秋候也采薇采蕨季春候也秋暮而往春暮未還道里悠逺吉㐫莫卜是以用憂豈感物而興男女之思乎采蘋大夫妻能循法度也何循乎法度善其能教女也昏義古者婦人先嫁三月教之公宫祖廟已毁教之于宗室教以婦徳婦言婦容婦功教成祭之牲用魚芼用蘋藻所以成婦順也此采蘋藻以芼魚也奠于宗室牖下教成之祭也不舉其物而舉所芼貴躬采也曰季女大夫之妻之女也甘棠美召伯也何美乎為其分陜能奉王政以正諸侯使強不陵弱衆不暴寡江漢之間附庸小國實賴之以安焉故託喻甘棠蔽芾之及物以志感豈聽訟棠下之説乎行露召伯聽訟也此非也嫠婦執節不貳之詞也唯野田草萊之區乃多行露唯鰥夫嫠婦乃有速獄之婚録是詩者明露屋草茅習俗亦美也多露沾濡之可厭我常夙夜謂其可厭矣喻潔已之有素也雀無角而穿屋鼠無牙而穿墉猶我未嘗許嫁妄致我于獄訟耳羔羊鵲巢功致也此序非也南國大夫能節儉也諸侯狐裘大夫羔裘士羊裘制也此宜羔裘而羊裘以是知其能儉服羊裘而委蛇自適無不足之色以是知其能節古者五羊而成一裘百里大夫五羖見稱即其事矣紽緎皆五知其皮之五也羔裘之直敵數羊裘以尚節儉故寧羊裘殷其雷勸以義也此士妻之詞也按周制大行人司儀上士八人中士十六人下士三十二人小雅偕偕士子朝夕從事是已曰振振者衆詞也從者非一我所懐之人可少休矣何為獨勞王事乎雷無形象猶有聲響可求不在山南則在山北君子行役顧不知所向往盖傷之也摽有梅男女之及時也非實男女也處士樂及明時效用也月令孟夏賛桀俊遂賢良行爵出禄必當其位故徴聘之典行焉梅實隕落正其候矣此時束帛之典不及必且後時矣故託士女相求以明志小星惠及下也非及下也􅉏御入直居寢之詞也古者王公臨事則有瞽史之道居寢則有暬御之箴莫非賢也賢者在事故能安命而述職言列宿在天小大異象王臣從政貴賤有等才有賢否位有崇卑各盡其職而已參昴以喻大臣小星則自擬也列星之中唯北斗參昴最為著見夏小正於參昴之伏見也屢書之入直者因所見而興詞唯其入直居寢是以抱衾與裯豈賤妾進御之謂乎江有汜美媵也何美乎以其不克與嫡偕行能待命於國無貳志也水已決去而復入者為汜岐流為渚别出為沱汜也渚也沱也媵自喻也言江水同源尚然有汜有渚有沱我自它國來媵寧能必其與嫡夫人偕往乎不怨不以而猶望其悔悟之萌可謂厚矣野有死麕惡無禮也非無禮也嘉其亦猶行古之道也上古昏嫁以麗皮為禮此以白茅包束麕鹿則麗皮之遺俗也誘之云者麗皮導其來聘之禮也稱尨吠知為山谷野鄙之氓也士以茅束麗皮而來女則施衿結縭而往畧繁禮尚真淳宛然羲皇上世之風矣二南之詩有美而無刺其述風化事行往往在乎景象之間不因言語文字而盡之學詩者所當知焉俗儒不通斯㫖至謂此詩為淫奔而欲刪之如其愚如其愚何彼穠矣美王姬也非美王姬也美武王之能以女下嫁于齊也唐棣之華翩其反而語其能下降也故以興王姬之肅雝焉桃李異色同時並盛故以興王姬齊子兩貴之相當絲綸皆釣具絲以取小魚綸以致大魚各有宜也唯齊侯之子乃足上當平王之孫耳始周公未定諡法之時於文考或稱平王或稱寧王毛傳釋平王為文王是矣彼平王宜臼齊侯諸兒烏足以汚召南邪王姬適齊實昉乎此帝乙歸妹之例也故謹存之騶虞鵲巢之應也非應鵲巢也記仁愛之及庶物也古者春獀夏苗秋獮冬狩一以除田害一以講武事葭蓬之茁則春獀矣葭蓬記其時豝豵之五記其物一發而罷記其仁騶也虞也記其官吁嗟乎者隠痛之詞也呼騶虞所以止殺也天子不合圍諸侯不揜羣五豝而取一焉明不揜羣也六騶羣騶事在左傳山虞澤虞屬在地官七騶咸駕著之月令騶虞之為官也顯矣而毛傳遽為白虎黒文之説夫白虎黒文爾雅釋獸所不載豈其然乎詩故卷一
