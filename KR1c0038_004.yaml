  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0038_WYG_004-1a, image: WYG0079/WYG0079-0569a.png}
body:
  text: 詩故卷四明朱謀㙔撰魏在禹貢冀州雷首之北析城之西周武以封同姓魯閔元年晉獻公滅之以與畢萬此詩七篇皆未滅時之詩仲尼何以録乎魏者舜禹之故都其民俗儉約勤謹有先王之遺風焉是可尚也葛屨刺褊也何褊乎褊服飾之過儉也禮嫁者三月廟見然後執婦功曰女手未成婦也曰左辟曰象揥貴者飾也曰葛屨履霜知服之非其時也曰要之襋之知其裳之敝裂須縫緝也冬服夏屨女執婦功在貧賤可耳貴者之家則固陋矣左辟者主賓相見主人就東階以辟尊是揖讓之事非婦初昏之禮也汾沮洳刺儉也公路掌公之路車者公行主兵車之行列者正是一官變文叶韻耳公族則主公之同姓族屬者以是人而采莫采桑藚菲厥飲食下侵細民之利過於儉矣莫菜莖大如筯而赤節節一葉似栁葉而厚有毛味酢而滑可羮亦可生食五方通謂之酸蒾楚俗三月三日采以和粉為餌謂之龍舌粄本草所謂鼠麴者也桑謂桑椹藚謂牛脣園有桃刺時也魏國褊急不能任賢日就侵削故刺之桃棘雖非美材苟樹藝得所其木亦可為弧為矢以除不祥其實亦可為核以充籩豆魏國雖狹苟得賢人治之亦當不至侵削今之侵削由不善樹人故也不知我之憂者乃曰彼所用賢矣子何為是言哉是蓋勿思而已陟岵孝子行役念父母也魏國介在秦晉迫於徴誅終歲奔命有往無返見役之人自審危亡託為內顧之詞以告哀耳岵屺之訓爾雅毛傳互異宜從雅訓可也十畝之間刺時也國勢日危在位者志欲潔身違亂隱迹農桑而已行與子還兮謂桑者也伐檀刺貪也非刺貪也父老訓勉子弟之詞也魏人勤於治生謹於供上父老居常輒以耕稼狩獵之務勉其子弟言將治車必先伐檀以豫其材將效賦稅之供必先耕稼狩獵是務誠以君子勞心食必兼味非若庶民徒食而已此惟正之供所當急也其忠厚戒謹之風藹然可訓矣後世説詩者牽于孟子素餐之義大費辭而難通彼孟子斷章取義焉耳何得執以説此乎三百蓋古語百猶勱也左傳曲踊三百曹詩三百赤芾皆同此義胡取禾三百㕓兮猶言何所取此強勉盈㕓之禾乎碩鼠刺重斂也國小力微困于誅求民不堪命故託詞碩鼠以道意貫與慣通謂慣習也三歲貫汝言始以國家多故暫重其賦已遂仍而不改今三歲矣殆已習為常法矣以是終身豈我力所能任乎郭景純言碩鼠頭似兔而尾有毛其色青黃好在田中食粟豆一名鼩鼠唐堯故都也周成王以封母弟叔虞是為唐侯叔虞之子燮嗣位以南有晉水改國號曰晉仲尼所録皆晉事也必稱唐存舊封亦以先王遺風之可尚也蟋蟀刺晉僖公也非刺僖也民俗歲晚務間相與燕飲而交相警也蟋蟀八月在宇九月在户云在堂則户下矣是黍稷告成之時也物變時移不知老之將至可無聚族類鄰曲以燕樂之乎然時不我與毋安于逸樂而忘其職業瞿瞿却顧不至荒淫可耳休休者勤勞之甚思欲少息也山有樞刺晉昭公也非刺昭也晉人憂沃之逼故為危言以諷于昭也昭公嗣文侯而封其叔父成師于曲沃是為曲沃桓叔桓叔得晉勢且逼昭晉大夫潘父謀弒昭而迎桓晉人不聽乃立昭侯之子孝侯焉此蓋有知潘父之謀者為是詩以覺悟于昭侯耳樞即刺榆榆則白枌也栲木皮厚數寸可為車輻杻材可為弓弩之幹一名萬歲即今冬青與漆栗皆堅韌之木積數十年乃成舉是六物者喻死亡在近不復能待其成也揚之水刺晉昭公也沃有篡宗奪國之謀而昭公不知晉人賦此以警悟之耳揚之水水之淺而緩者其中白石易見喻隱謀之彰露也不敢以告人故為毖密正以告昭也椒聊刺晉昭公也非刺昭也憂曲沃之益強也椒之為物枝強于本及其成實蕃衍本常因之以披喻曲沃之強盛終當并晉也綢繆刺晉亂也何所刺刺潘父也三星在天夜之中也中夜束薪將俟旦而鬻之賤者之事也於此而有美粲之婦來奔彼束薪者不擇義理亦遽受之邂逅相得何其樂哉賤其行而深惡之故託為此詞杕杜刺時也此何時哀侯時也哀侯之世曲沃益強本根益弱乃不知修德親族而侵陘庭之田於是陘庭南鄙啓曲沃伐翼其後卒為曲沃所執陘庭之田蓋哀侯之弟所有者故以杕杜相芘者諷之杜者梨屬實小而酢枝竦葉大行者芘之喻曲沃也獨行踽踽喻哀侯之寡援也同父則陘庭也羔裘刺時也非刺時也晉翼已亡晉人重去翼也羔裘豹袪卿大夫之服也我人謂翼也他人則沃也居居安適貌究究凋敝也言此羔裘之人於我甚適雖極凋敝我無厭棄之心唯其舊好之難忘耳鴇羽刺時也何刺乎傷晉亂也昭公之後大亂者五世君子下從征役不得遂其養親之志故賦此詩陸農師言鴇無舌而連蹄性不集木今集木違其性雖罹危苦又以無舌不能哀鳴喻從役者濱于死亡無所控告也無衣刺晉武公也非刺晉武也刺僖王也曲沃武公始并晉國以寶器賂周僖王王因命武公為晉君列于諸侯翼人傷僖王不能正沃之罪顧受賂而封之是以刺也子之衣謂天子之命服有杕之杜刺晉武公也非刺晉武也好賢之詞也晉之好賢莫如公子重耳所從五臣卒以致霸此蓋公子時作杕杜生于道周有葉則人趨芘之今徒杕然挺立無復餘葉故行者逝而不顧傷已方處窮困無祿位以致士也葛生刺晉獻公也獻公伐驪戎滅耿滅霍滅魏伐東山皋落氏滅夏陽伐蒲滅虢襲虞伐屈以至敗狄于采桑二十三年之間凡十一戰其喪亡戎陳者亦多矣角枕錦衾則卿大夫之室矣貴者且憂死亡况賤士乎葛蘝附物得遂其生豫之所美顧從役在外不遑寧止使我常有仳離獨處之嘆何哉怨懟之詞也誰與獨處猶檀弓所謂誰與哭者倒句法也百歲之後以死相要也歸于其居居字與夜不叶當是舍字之誤采苓刺晉獻公也苓草生于下隰荼苦生于平原葑即蔓菁生于園圃三者皆非山中之物今曰采于首陽則妄誕矣然者許諾之詞苟亦無然謂且詳察真偽勿即以為可信而遽諾之也秦車鄰美秦仲也秦仲以附庸之國入為宣王大夫始有車馬之儀寺人之令還歸秦谷邑人創見其盛故賦此詩秦仲既歸略其名分與國中雄桀之士並坐鼓瑟其下感激榮遇願得及時逞志以效死力不能坐老牖下其悲壯之氣勃乎莫禦秦之所以強者由是夫駟驖美襄公也襄公以攘西戎之功受平王岐豐八百里之地不聞延訪遺老講求政教而惟田獵是務所同行者公之媚子也所從禽者獵狗也以鸞車而載田犬所尚可知矣孔子録此蓋譏之非美之也載獫歇驕謂車載獫獢二犬以歇息之非獫猲獢皆田犬也詩緝稱田犬長喙而短喙者非田犬也毛傳誤耳爾雅所載又後世因毛傳而竄入之者也小戎美襄公也非獨美也述其用秦俗而變周制也周之出師路車有奭八鸞瑲瑲今則易以小戎俴駟不務持重唯便利是乘良人賢士驅以即戎不復尚德而唯力是競作者託為婦人念夫之詞蓋傷王政之不可復矣蒹葭刺襄公也襄公奄有成周不能訪求故老修復先王之政教故作者刺之蒹似萑而細髙數尺葭即蘆也白露為霜時之變也蒹葭蒼蒼物未凋也喻周雖東遷人物猶存顧不知所用之耳逆流而上曰遡洄順流而涉曰遡遊用非其道猶逆流而上也終南戒襄公也終南惇物雍州之鎮也地土廣大故有條有梅有屺有堂生物悉備君子臨此而有之錦衣狐裘煥然改觀矣宜其以功德被民夀考不忘也條一名槄即今山楸梅則酢實之梅皆南土所宜者崔靈恩本紀字作屺山之極北受風不生草木者也堂謂深山平衍之所隈燠能蕃草木者也舉是四者以明秦地之廣直被南北耳黃鳥哀三良也黃鳥今之璊雀栖止瓦屋者此鳥十百為羣恆集荆棘間交交喧噪若有所語喻秦人聞用三良殉葬街談巷議沸騰不息有所驚怪也誰從穆公而下則其所為談議之略矣詩所稱黃鳥于飛集于灌木則黃鸝也交交黃鳥小雅黃鳥無啄我粟則璊雀也名雖同而實異晨風刺康公也何刺乎刺棄三良也三良見殺賢臣亦相率而遁世矣晨風鸇也善擊鳩鴿燕雀之屬鴪然長鳴則鳥雀咸匿藏茂林之中所謂為林驅雀者鸇也是已苞櫟六駁苞棣樹檖皆北林之物鳥雀所藏者也晨風一鳴而諸禽屏迹但見林木而已喻康公殺三良而羣賢競引去也未見君子憂心欽欽據已去而言也如何如何忘我實多託為康公自詰之詞也無衣刺用兵也非刺也秦用其教變周俗也相要于無事之日相死于有事之年其好勇輕生尚功負氣至如此先王之風于是乎熄矣渭陽康公念母也非念母也送舅氏重耳入晉也灌輿刺康公也秦所尚者武功所共事者權謀變詐之士於賢人君子宜其見踈薄也夏屋巾羃之設采色者周官染人秋染夏孤乘夏篆卿乘夏縵檀弓封之若夏屋者是也五色具備謂之夏四簋之食黍稷稻粱也權輿始也者造衡自權始造車自輿始詩故卷四
