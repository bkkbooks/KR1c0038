body:
  text: 詩故卷六明朱謀㙔撰小雅鹿鳴燕羣臣嘉賔也曰燕羣臣是也曰嘉賔贅詞也燕羣臣者通上下之情廣咨訪之益何取興于鹿鳴乎鹿性警而善猜見人必驚顧逸去此云呦呦食蘋安適可知喻燕飲之際略威嚴洽歡好通話言去猜忌也猜忌去話言通德音可得而聞矣四牡勞使臣之來也使臣自逺而來歌此以燕勞之也盬本池鹽因風日而成未經煆煉故其性不堅固王事靡盬謂王事理須慎重不敢不堅固也鳥短尾者為隼隼屬之翩翩而一宿者莫如鳺鴀今鵓鴿也此鳥謹慤有常雖移之逺所猶識故處翩翩來歸喻使臣往而復返也皇皇者華君遣使臣也皇皇猶煌煌言華之紅白燦爛也方當陽春桃李爛漫景物暄妍萬物各遂其生孰無室家燕婉之好乃今皇皇之華不覩于家庭而覩于原隰怨曠之情不言可知矣詩人妙于體物不盡其詞往往如此善讀詩者自得之常棣燕兄弟也周公既以大義誅管蔡矣恐兄弟之恩由此遂薄故因燕同姓而歌是詩常棣白華絳跗一苞數蕚子如櫻桃即今郁李詩舉此者喻兄弟同胞而産非它姓比也裒之訓聚原隰裒矣言已死而葬原隰聚土為墳也脊令小鳥其性慧黠每雙下取食屢啄屢顧見人必疾鳴飛去其疾鳴者警同羣也兄弟見患相救亦猶此矣恆訟曰䦧務與侮通言兄弟不幸而致恆訟情已乖忤一旦卒有外侮橫加必且同力抗而禦之不覺宿忿之銷矣天性原親故也雖有良朋屈于理勢即欲禦之不可得矣伐木燕朋友故舊也非燕朋友故舊也燕異姓諸侯之樂也伐大木者始有丁丁之聲舉大木者乃用許許之力明致大物非一人可辦治天下國家必求輔相以佐助之也黃鳥冬蟄谷中春深乃出性好雙飛其始遷喬必嚶嚶求友得友乃去喻人可無求其朋友乎以筐笮酒曰釃酒之不釃安得藇然而衍以喻朋友不求安得成其好乎故有肥羜肥牡必速諸父諸舅而燕饗之也天保下報上也鹿鳴以至伐木皆上所以燕其下此篇則下所歌以答其上也何福不除福日新也以莫不庶福蕃庶也罄無不宜無拂忤也以莫不興無衰替也以莫不增無耗損也遍為爾德無異心也人臣將以福祿祝其君不敢自為之詞必稱天保之天定之先公先王以詒之尊敬之義也采薇遣戍役也何所戍戍玁狁也玁狁北狄在漢為胸奴今之北方諸部是矣春中往戍至冬始還故首叙薇之初生終以雨雪霏霏也維常之華即唐棣也召南以興王姬之車此詩以興君子之車皆喻車飾之繁縟也制勝莫如車北地廣漠侵掠無定所戍者聨車為營無有定在一月三捷防秋之效也豈不日戒待代者也出車勞還率也南仲其率也毛傳謂南仲者文王之屬竹書紀年因附會之然尋考大雅蓋宣王時詩耳簡書者邉徼告急之書非戒命也喓喓草蟲躍躍阜螽秋冬之際也斯薄伐西戎之日也至春而歸則奏績矣杕杜勞還役也出車以勞其率杕杜以勞其士衆周德於是乎浹于人心矣杜梨成實其葉盡脫杕然而立深秋之候也其葉萋萋復生則春晚矣明從役之久也魚麗美萬物盛多能備禮也非能備禮也蓋還率之答出車也西北土厚水深牛羊多而魚鱉少故燕享者以魚鱉為備物舉所貴也魚具鱨鯊魴鱧與鰋鯉它品之豐可知矣南陔白華華黍有其義而亡其辭朱仲晦以為三篇有聲而無詞夫無詞安得而有聲三篇之名何自而起乎由庚崇丘由儀三篇皆亡也南有嘉魚樂與賢也燕享通用之樂也鎬京北高南下水澤歸南嘉魚集之故罩汕施焉興君子有酒宜與嘉賔燕樂也豈必江漢丙穴而後有嘉魚哉曰嘉賔曰甘瓠上燕下也翩翩者隼蒸然來思喻嘉賔燕已而復燕之如鳺鴀往而復來敬愛無已也南山有臺樂得賢也非樂得賢也在下者歌此以答南有嘉魚也古者君臣燕飲必賦詩焉或以通其誠或以宣其志故小雅菁莪以前多上下施報之詞此詩五章所舉草木各有倫類臺也萊也附地者故曰邦家之基桑也楊也葉之沃若者也故曰邦家之光杞也李也能多子者也故曰民之父母栲杻也枸楰也耐久者也故曰睂夀黃耉其取材之相當非直叶韻而已也臺莎也萊藜也杞枸杞也栲栲櫟也杻檍也枸苦楸也或曰枸椇一名枅枸蓼蕭澤及四海也非澤及四海也天子燕諸侯諸侯賦此以致頌禱也蕭蒿屬葉碎細而有香周人焫蕭合羶薌而祀神尚臭也蕭葉既碎受露為難今曰零露湑兮明燕飲之久夜向深也我心寫兮下情得上達也燕笑語兮霽威嚴也譽處猶言游處振鷺之永終譽韓宣之譽嘉樹訓同也令德夀豈并壽考豈弟言之也已燕則有車焉之錫故曰鞗革沖沖和鸞雍雍湛露天子燕諸侯也蓋天子答蓼蕭之歌也湛露匪陽不晞期燕飲之達曙也露重則豐草俯垂飲在宗室則欲極其醉飽也杞棘葉小而受露夜極深也椅桐之實離離下垂喻諸侯既醉能恭謹也彤弓天子錫有功諸侯也天子賜有功者彤弓一彤矢百盧弓矢千今獨稱彤弓舉所貴重者言之菁菁者莪樂育材也非育材也諸侯答彤弓也莪謂之蘿似邪蒿而細科香美可餌即今蒔蘿其苖與蒿相似者莪微物也以采自中阿故得登于食品喻已有微勞見知天子得䝉殊寵也錫我百朋謂彤弓也楊舟沉浮未定喻已功罪未審也既見錫豫之寵忡忡之心始獲安定矣敬慎之詞也古者以貝為貨貝有五等二貝為一朋大貝一朋直錢二百十文牡貝么貝小貝次之不成貝者不得為朋枚直三文曰百朋者二百貝也六月宣王北伐也尹吉甫北伐而歸宣王燕勞之也焦穫澤名在今陜西涇陽縣北去鎬京百里太原即今固原去朔方五百餘里玁狁在其東北則入周要路當在此矣季本云然張仲蓋同吉甫北伐而驂乘者采芑宣王南征也荆蠻負阻自古為患虞夏之際則有三苖成湯武丁之世則有荆蠻周公亦曰戎狄是膺荆舒是懲及周之衰復抗王命宣王中興命方叔征之芑菜陸疏謂似苦菜莖青白色摘其葉有白汁出可茹亦可生食蓋即今之油菜南人布種田間用以腴田者薄言采芑于彼新田于此菑畝言采之甚易為力喻方叔之征荆蠻不難克也反草曰菑賈思協言正月菑强土二月可菑美田三月可菑白沙輕土之田五月六月可菑麥田知用芑于菑所以為腴也服其命服蓋若羊祜輕裘緩帶之意也鷹隼飛薄雲霄下察豪末所攫必得以喻方叔廟算先定師不虛發必制勝也兵法鼓之則進重鼓則擊金之則止重金則退今曰鉦人伐鼓明有進而無退也執訊獲醜詰問所獲之衆而差等其罪也車攻宣王復古也宣王既攘夷狄復修文武之政㑹諸侯于東都因田獵而講武焉甫草者畜牧之地周語所謂藪有圃草囿有林池是也摶獸于敖圃草之所也敖山在今鄭州滎陽西十有五里會同有繹諸侯相繼而至也決拾皆射具決以護右指拾以護左臂柴說文作㧘訓積也謂積所獲之禽也猗讀如緑竹猗猗之猗兩驂不猗謂範我馳驅不詭遇也破讀如波北方之音也有聞無聲言但聞金鼓之節制絶無徒御之喧囂軍政肅然搜獵之禮於是乎大成誠可謂君子之軍矣吉日美宣王田也何所田西都之田也大阜者草木隈隩之所獸所聚也春搜夏苗秋獮冬狩為田除害也害稼穡者莫甚于鹿豕故田獵獨取之曰麀鹿曰小豝皆是物也田而得兕是為大獲徒林之殪青兕之殫皆其比矣鴻鴈美宣王也何美乎謂能安集來歸之民也厲王之虐道路以目榮公專利民命不堪流散于四方者多矣宣王中興勞來而安集之還歸者喜得所而追賦此詩鴻鴈秋南春北以辟寒暑民自喻也爰及攜挈之也攜挈可矜之人同歸故里哀其鰥寡孤獨無所恃賴耳凡鳥逺來栖集必嗷嗷羣鳴若喜得其所也我今作歌非宣驕矜之意也亦自述其劬勞之苦耳鴻鴈兩物形略相似第鴻大而鴈小鴻白而鴈蒼古之所謂白鴈今之所謂天鵝則鴻也漸爻取象于鴻飛有行列可知矣庭燎美宣王也因以針之者是也宣王始勤終怠姜后脫簪珥待罪永巷以納諫此殆姜后之所作乎夜未央未中夜也艾者衰盡之名夜未艾漏未盡也夜鄉晨則漏盡而將曙矣沔水規宣王也非規宣也諸侯相戒宗周也其時蓋有不來朝者王將起諸侯之師以伐之受命者賦此以諷諭將見伐者焉流水朝宗于海喻諸侯當宗王室也隼之飛揚將有所擊喻宣王將伐有罪也兄弟諸友諸侯相謂也師之所加國將蹀血誅罰亦不小矣奈何獨無父母之念乎諷其悔罪入朝禍亂可免也隼之方揚未有定擊今則率彼中陵擊者有定所矣衆所共聞形之訛言矣汝獨不知所懲乎我之友邦誠能率職來朝則讒謗何自而生乎痛誨之詞也鶴鳴誨宣王也鶴性嗜魚籌量進止所取必得方其欲漁之時寂然若寐魚不之覺及既得魚則長鳴水側魚聞其聲爭自濳藏矣故曰鶴鳴于九臯魚濳在淵喻殺伐之志外形人將震懼而逺去也茂林之下不能無隕蘀喻大德者不能無小疵也它山之石可以攻玉喻微賤之言亦有時而適用也水所衝蕩之級謂之臯云九臯者喻涯岸之高深也鶴以取魚故即彼臯壤耳石謂砂石今解玉者用邢砂詳味是詩豈諸侯之答沔水乎抑將料民太原之時乎詩道廣博𢎞通不可以序槩之類如此祈父刺宣王也傳稱宣王之末司馬職廢姜戎為敗周語宣王三十九年戰于千畝王師敗績于姜氏之戎蓋其事也祈圻通謂王畿也司馬掌封畿之甲兵故曰圻父爪牙虎賁氏掌先後王而趨者今之衛士也六軍之士出自六鄉法不取諸虎賁氏今以軍數不足移之以行故曰胡轉豫于恤尸典治也為其母主治饔飱知其為獨子無旁兄弟矣獨子違母從征是以其詞甚哀白駒大夫刺宣王也何刺乎鶴鳴之應也王不納誨賢者懼禍及身故去之駕白駒者自比二王之後示不臣也前二章將去而勉留之後二章已去而懷念之生芻一束白駒樂得其所也其人如玉執志不回如玉之堅也黃鳥刺宣王也宣王之世諸侯兄弟有失所而來依于王室者及其季年政體怠荒禮意衰薄窮困而不遂思返故國而賦是詩黃鳥謂璊雀非鸝黃也桑榖竝有實栩即杼也其實似栗而小狙公賦芧者是也凶年儉歲人皆采之以充饑託言黃鳥無啄此物留以待我為糧困極之詞也我行其野刺宣王也黃鳥刺薄同姓此詩刺薄異姓諸侯也昏姻之故謂與王室有甥舅之稱也周制賔至門尹除門司里授館甸人執薪廪人獻餼以示厚也今皆不然故以行野蔽樗為喻蓫牛蘈今之羊蹄菜也葍燕䔰根正白可熟噉療饑葍讀如逼異讀如翼成誠通實也實非賢哲富足而逺我亦直好新作異而已論語齊景公章所引斷章取義耳斯干宣王考室也雅自祈父以下宣德日衰未久而幽未久而東矣安得考室之詩乎斯蓋成王作洛周公賦詩首以兄弟相好致祝懲管蔡之禍也成王時蓋新婚故并祝其生育之蕃且戒生女以無非無儀又懲妲己亡殷之事也前後間斷無所附麗故録于此秩秩斯干堂基崇髙階級以次而上若犯險也幽幽南山南見翠微之山依希難審也竹苞喻堂基之堅固松茂喻南山之常青古公作岐百堵皆興此亦百堵不欲過侈故曰似續妣祖室西南隅謂之奧常患其暗築室之時於其所置户牖焉故曰西南其戶如鳥斯革革者疾也謂棟宇之制如征鳥厲疾盤于雲中高且平也如翬斯飛謂丹彩之飾如文雉奮翼煥乎其有章也堂以構室垣以繚堂故曰君子攸躋殖殖深邃有容之貌覺明爽也庭則深邃有容楹則明爽通光噲噲猶快快爽塏之意也正謂正寢即路寢也冥謂奧窔則室中也大人謂太卜掌三夢之法者周禮赤璋以禮南方㺯之以璋南靣之象也裼字韓詩作􅠷小兒被名也男子生衣而裳之出其手示有志于四方女子則衣以褓被并手足而裹之示其無外務也無羊宣王考牧也考室考牧篇次聨絡蓋亦成王時詩世道綦隆生息蕃廡故史氏述之爾雅牛之屬黑脣曰犉黑眥曰牰黑耳曰犚黑腹曰牧黑腳曰犈今獨舉一犉至于九十其餘可類推矣三十維物則牰犚牧犈之物也周人尚騂物至三十騂其備矣以薪以蒸游牧也以雌以雄别羣也皆牧法也賈思協言牧羊者須緩驅游行勿令停息乃能肥充大率十羊二羝羝少則不孕羝多則亂羣不孕必瘦瘦則經冬或死矣羊性護前日夕則競先爭歸陵矜不讓故曰矜矜兢兢非堅彊也羊皆健前知其舉羣無病不虧損矣牛羊既休牧人安寢明旦則以夢告于王王使太卜占之一國之衆非衆也乃魚也是乃豐年之兆也郊野龜蛇之旐非旐也乃鳥隼之旟也是蓋室家蕃息之兆也即一牧豎之夢孜孜焉卜以求之矧賢人君子之言乎此周室所以得人而國祚所以靈長也詩故卷六
