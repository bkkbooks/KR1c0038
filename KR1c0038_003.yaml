body:
  text: 詩故卷三明朱謀㙔撰王黍離閔宗周也何以閔閔東遷之失謀也西周政令所以能行乎諸侯者非徒文武成康之德亦以地勢險固足食足兵可以東制諸侯之命耳幽王雖死驪山犬戎無盤據豐鄗之理乃因一敗遽爾東遷有識之士於其行也痛悼失圖故賦此詩黍稷離離下垂而碩猶有憂者中心思惟而傾其首也陳平深憂吕氏之亂陸賈入坐而平不見賈是其驗矣非故宫廟盡為禾黍之場也君子于役刺平王也非刺平也傷周弱也西周之世大夫非無行役也出有四牡皇華之勞入有杕杜魚麗之燕人皆以為盛典而寵榮之也逮夫東遷政在諸侯而天子之公卿大夫奔走聘問無有寧歲昔時燕勞之典廢矣大夫之妻賦此而孔子録之正以傷周室之日微耳不知其期曷至哉七言通為一句君子陽陽閔周也非閔周也君子為貧而仕卑官也所謂卑官則籥師也房者俎也王公立飫則有房蒸魯頌亦稱籩豆大房萬舞洋洋蓋房俎籥舞俱在堂下故曰招我由房非路寢之房也敖者燕舞之位樂記所謂綴兆是矣揚之水刺平王也中谷有蓷閔周也非閔周也凶年饑饉女子自傷困窮不能賙其母家也蓷名茺蔚亦名益母因舉益母而知其為念母家因遇人之艱難而知其為女子也昔曾子覩益母而興悲殆有感于是詩乎兔爰閔周也非閔周也君子哀時命也兔狡於避禍雉拙於自免二物小大相等故古人並舉之內則雉兔皆有芼孟子雉兔者往焉是也兔以喻小人雉以自喻爰爰緩意謂能以狡自緩其死也葛藟王族刺平王也非刺也諷王親其族類以自立也鄭伯朝周王不禮焉周桓公諫曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣葛藟之諷殆為是乎采葛懼讒也葛善攀附蕭艾並善蕪穢皆喻小人之黨也好讒之人醜正惡直唯依阿鄙賤之是近故我一日不見遽已相忘不啻三月三歲之久矣大車刺周大夫也非刺周大夫也商者之婦寄其夫也周之地狹民衆多賈齊魯梁楚仰機利而逐末業輕去家室其妻重于改適故賦此寄焉大車牛車任載者非大夫車也毳衣毛褐將車者之服非毳冕也我見毳衣之人數將牛車而來子獨不歸疑棄我矣我欲他奔猶畏子之或來有所不敢唯誓死以待之此其俗猶有足稱者焉丘中有麻思賢也非思賢也商者答大車也子言我久不歸資生無所然丘園之中有麻可績有麥可食有李可殽也凡此三物足以留子我亦將施施而來與子共之矣貽我佩玖者感其異室同穴之誓寶重其言如瓊玖之可佩服也録此二詩見周俗忠厚尚禮有如此鄭詩二十一篇始武莊終忽突皆國事也其它亦多賢人君子之詞而宋世之儒誤釋放鄭聲一語遂去小序盡以淫奔目之夫詩非聲也聲非詩也措諸文詞是為詩被諸管絃音律是為聲鄭音好濫而淫志者故仲尼放之豈緇衣仲子諸詩乎緇衣美武公也周人之詞也桓公以鄭伯入相于周死犬戎之難武公繼為平王司徒世善其職故周人歌之適謂安適其館舍也若謂廩餼之不繼而欲還我將授子以粲焉是皆勉留之意也席有四訓毛傳訓大韓詩訓儲許慎訓為廣多唯朱傳訓為安舒者得之將仲子刺莊公也莊公志在除段欲其積釁纍瑕而後動鄭人已知之審矣故託為公拒祭仲之詞以杞桑與檀比叔段不欲即折喻欲待其自斃耳叔于田刺莊公也非刺莊也著叔段之得衆也于田取禽也里塗曰巷里巷者細民所居叔段處京既有人民社稷之寄宜求良士以輔弼之今乃獨為里巷小人所好是速亡之道耳大叔于田刺莊公也非刺莊也著叔段之繕其甲兵也稱大叔者左傳所謂京城太叔是也清人刺文公也髙克所將者清邑之兵也曰彭曰消曰軸三境之地師所次也駟介者兵車之駟也車上載兵獨稱二矛者舉兵之最長者以該之左旋右抽者三軍之左右皆潰散而歸清邑也獨髙克所將中軍在爾羔裘刺朝也非刺朝也美賢大夫也古者君狐裘大夫緇衣羔裘以羊性剛直可尚羔又柔澤溫暖可親加以豹飾又表其武三德具備故曰三英語此大夫之德足稱此裘也舍命不渝守死善道也豈叔詹子皮之徒與遵大路思君子也非思君子也賢者以道去國也遵大路其去明也寁者速也不寁故者與聞政事已久志好浹洽非新知比也此蓋託為挽留者之詞嚴粲謂鄭莊公殺弟幽母射王中肩悖逆已甚君子去之殆有為哉女曰雞鳴刺不悅德也非刺也賢夫婦交相警戒之詞也稱士女始婚者也弋鳬雁丈夫之事也調五味中饋之職也琴瑟靜好養德之具也宜其酒饌以奉賓客所以成德也古者子事父母左右佩用紛帨刀礪大觽小觽金燧玦捍管遰木燧謂之雜佩非珩璜琚瑀之屬也宜言飲酒與子偕老者言調和滋味佐酒以勞慰其夫願執此道偕老而不廢也有女同車刺忽也何刺乎追刺之也忽以不昏于齊遂無大援終見逐于鄭國人追刺其失圖也山有扶蘇刺忽也何所刺之刺其暗于任人而致亂亡也扶蘇猶言扶疏木相扶而植者如所謂扶桑扶栘扶栁之類非小木也扶蘇喬松宜在髙山比賢人君子宜處顯位荷華游龍宜生下隰比狂狡之童宜備奔走今所庸顯者莫非狂狡故刺之蘀兮刺忽也非刺也鄭人思黜突而納忽也忽以世子踐位正矣宋人乃使祭仲立突而逐忽鄭人故不義突而賦此詩託風之隕蘀以見志叔兮伯兮謂大國也安得大國秉義納忽我當起而應之矣狡童刺忽也非刺忽也刺突之與雍糾為謀以殺祭仲也雍糾泄謀于妻而見殺突以出奔所謂狡童其謂糾乎惜其不與老成謀之而僨事褰裳思見正也突與忽爭國更出更入不復以禮義相先故思得大國以正其名分焉狂童之狂也且謂大國不來正之者直以突之狂而無禮不足正耳絶望之詞也丰刺亂也非刺亂也志悔恨也鄭女蓋有矜其族類門地已許嫁而中悔者既而愆期無歸還自咎恨耳悔婚之志未必親迎之際曰巷曰堂直託喻耳叔兮伯兮不一人者已失所婚覬他姓之我求也東門之墠刺亂也非刺亂也惜狷介者之遁世也除地町町然者謂之墠陂陀不平而可種藝者之謂阪踐謂樹栗之有行列也東門之墠其阪有茹藘焉是其人所居之地也樹栗林然有行是其家室所在也第絶人避世不可得而見耳風雨思君子也喪亂之中樂見秉德不回之士也風雨凄凄以氣言風雨瀟瀟以聲言雞鳴不已語雞能司晨不為風雨晦冥而廢其鳴也子襟刺學校廢也非刺學校廢也朋友失好者之相責讓也城闕都㑹之所非遐荒也以細故而斷平生之歡遂不相見是誠絶我矣揚之水閔忽之無忠臣也非閔忽也諷聽讒也出其東門閔亂也非閔亂也遁世者答東門之墠之詞也鄭俗尚縞故僑札相見贈以縞帶此云縞衣綦巾已之室也荼者苦菜河北最蕃今俗呼為舒菜如荼猶言如雲喻女子之衆非喪服之謂也出城闉者蓋相率郊外墦間之祭耳野有蔓草思遇時也非思遇時思其治也有道之世俊桀在位野無奧草矣此何時乎君子在野田卒汚萊國何當而治乎曰蔓草零露知田野之不辟也有美一人邂逅于草露之區知君子之在野也昔六卿餞韓宣子子齹首賦此詩宣子善之曰吾有望矣豈男女思不期而㑹者哉溱洧刺亂也非刺亂也志其俗之荒于游觀也韓詩傅稱鄭國之俗三月上已桃花水下之時士女競出溱洧之上執蘭招魂續魄以祓不祥是則漢世以來上已祓除所昉也蕳草一名都梁髙四五尺性善殺蠱故士女秉之以祓不祥耳勺藥即今牡丹華于上已之時中州等之荆榛折華以贈亦士女夫婦之相愛非妄一男子見所悅而贈之也齊雞鳴思賢妃也非思賢妃也蓋賢夫人能警戒以成其君之德也雞三號卒明而後蠅蚋交作已乃日出東方是為黎明久之日光被物是為大明朝㑹者雞鳴來集别色始入其時蒼蠅交作而有聲自此以往日亦出矣故曰匪東方則明日出之光傳寫之誤遂作月出故說者費詞而難通考之周史武王女適齊為乙公夫人乙公生癸公癸公之子為哀公以荒淫誅此所謂賢者其乙公之王姬乎還刺荒也何荒乎刺禽荒也哀公好田無厭國人化之遂以成俗狼似犬而大鋭頭細腰髙前廣後得人物則殘其軀體而食之出必兩頭相恃猛捷貪忍雖用兵者莫能免今曰並驅而從兩狼信便捷矣肩與豜通田豕之健者著刺時也刺不親迎也古者冕而親迎充耳瓊華乃冕服中之一物著與寧同人君塞門之屏也唯邦君乃樹塞門親迎宜于國門今僅在朝寧之間簡禮甚矣送夫人者訝其非禮故賦此詩充耳曰瑱懸瑱之絲曰紞君紞五色臣三色曰素曰青曰黃謂紞也錯舉其色之三而五可知瓊華瓊瑩瓊英則紞之所懸之瑱也東方之日刺衰也非刺衰也刺淫也旦而彼姝入室日夕乃出蓋大夫之妻入朝而其君以無禮加之耳東方未明刺無節也周制大事用日出今東方未明已有以失朝獲罪者故託挈壺失職以刺之顛謂衣之領裳之要也今倒持之故曰顛倒裳衣晞者日光被物之名楚辭所謂晞髮是已曰未晞者日未出也栁本賤木植諸樊圃則有主者猶挈壺之有其職也狂夫越樊折栁猶且瞿瞿四顧恐致誚讓况晨昏大朝之期可不以告其君乎此詩序在哀襄之間蓋厲公時矣南山刺襄公也南山崔崔宜為虎豹所宅今乃雄狐蹲踞其間喻齊國之大而襄公以鳥獸行君臨之也葛屨賤物猶兩兩相伍冠緌微物猶雙雙為用各有耦也齊子已適魯矣豈吾耦乎藝麻之法須得良田而熟耕之縱橫七遍麻乃無葉婚配之際可無審處其禮而但窮極其淫泆之心乎甫田刺襄公也襄公嘗師于首止殺鄭子亹轘髙渠彌矣又嘗伐衛而納紀季之􅈶矣又嘗與宋魯陳蔡再伐衛而納惠公矣皆務大功而求伯于諸侯之事也內行不治徒負衆而恃力何能有成乎總角而辨躐等躁蹙之喻也盧令刺荒也何所刺刺襄公也令本作獜犬之健也鋂者大鎖之名也北方呼黑為盧而走狗之駿者則有韓盧環以繫項鋂以鎖之制其逸也鬈好貌偲強也義見說文敝笱刺文姜也不獨刺文姜也正以刺魯莊公也莊公不能制母之欲使之瀆亂于齊如敝笱不能止細魚耳鰥與鯤通魚禁鯤鱬鳥翼鷇卵皆其微也鄭箋訓義是已盈車之鰥事出孔叢又因是詩而生其說耳載驅齊人刺襄公也非刺襄也刺文姜也蓋莊公五年夫人如齊師時事也薄薄輕疾貌發夕者急于赴齊即夕啓行不能待旦也豈弟訓為樂易謂其得行志意內快于已無有阻之者猗嗟刺魯莊公也是蓋莊及齊人狩于禚之詩也歷舉威儀技藝之長則其不足者自見頎而長兮言軀幹之壯偉也抑若揚兮言威儀之矜莊也美目而下皆述其善射之狀也目上為名謂張目注視而發矢也方射之時無所用舞舞則選兮謂射耦也射禮王六耦諸侯四耦猶舞佾列焉射者搢三挾一故稱四矢詩故卷三
