body:
  text: 詩故卷二明朱謀㙔撰邶鄘衛商紂畿內地也自紂城而北謂之邶其南謂之鄘邶鄘以東謂之衛始武王克商封紂子武庚為殷後而使管叔蔡叔霍叔往監之是為三監武王崩武庚叛周公討三叔而誅之更建邶鄘衛而分治其地衛則康叔是已邶鄘之封莫可考厥後亦并于衛故邶鄘之詩皆衛詩也仲尼録詩宜若可沒邶鄘矣然必存之存三監也存三監所以存殷也武庚之誅仲尼所不豫故存邶鄘以致意焉柏舟言仁人而不遇也所謂仁人莊薑是已奚必頃公之世乎耿耿者伏枕終夕如有所聞也棣棣者自反之詞威儀棣棣自反而有禮也愠處憂戚之間記稱憂斯愠愠斯戚是已以怒訓愠則誤矣微者虧也謂日食也莊公失道反常如日虧其明非嫡庶之喻緑衣莊薑之傷己也既失位嬖妾得以相陵也是詩前二章以緑衣比嬖人後二章以絺綌自比命數之涼薄緑兮絲兮當作絺兮綌兮傳寫之訛也章法則然燕燕莊薑送歸妾也孰為妾陳女戴媯是也燕之往來必雙故曰燕燕其飛也一上一下故曰頡之頏之言於戴媯在昔興居未嘗或離如雙燕然今當長别能勿悲乎任以應物言塞淵以處己言縝密無所失之謂塞靜定能鑒物之謂淵淑慎其身先君之思皆朂詞也云淑慎者猶曰善自珍攝耳日月莊薑傷己也非傷己也傷州吁之亂衛也吁弒君篡立敢為悖逆不復名分之畏知其終不能定衛矣日盈月虧晝夜代明自古而然以喻君臣名分之有定也方其作逆我嘗以是教戒之終不我聽奈之何哉終風莊薑傷己也非傷己也傷州吁之當見討也暴風終日拔木飛砂亂常甚矣喻其弒逆之事也異常之風非雨不解曀曀其隂虺虺其雷將雨之候矣喻州吁之將見討也我以正而教戒之彼第謔浪笑傲以應之如是之人其能免乎寤言不寐憂之以廢寢也願言則嚏願言則懷謂我有所感悟願與之言也豈宰醜蒞殺之謀既已聞之莊薑乎擊鼓怨州吁也踊躍用兵言州吁之志也不我以歸憂敗亡也爰居爰處據兵車而言也車恃馬以行馬之既喪敗可知矣敗則亡于林下而尸之邲之戰趙旃棄車而走林者是也死生契濶夫妻始焉約與偕老之契甚濶逺也今迫死亡濶逺之契不我展矣偕老之言不我信矣凱風美孝子也寡母不安其室七子自責以諷之幹母之蠱矣棘心棘栽之始則生稚弱之名也至于薪則材成矣黃鳥鸝也睍睆當作睆睆羽毛光華貌傳寫之誤也韓詩傳作簡簡黃鳥例可推矣雄雉刺衛宣公也宣公不恤國事軍旅數起男女怨曠之詞也雉性妬壟護疆飛不越域其髙不過丈修三之雄雊雌應兩相依也君子獨從役逺去其存其亡杳不可知曾斯雉之不如矣瞻彼日月朔望盈虧者凡幾見矣道雖云逺亦可來矣百爾君子何其不知德行而我君子獨以德行見用乎然德行又豈難知哉若能不忮不求則無往而不可適矣匏有苦葉刺衛宣公也宣公蒸于夷薑生急子事載左傳縱欲瀆倫甚矣故國人亟舉悖理亂倫者反覆以刺之匏為腰舟所以利涉也方其有葉之時濟渡之水正深矣垂帶而涉曰厲涉之淺也褰裳而涉曰揭涉之深也今曰深則厲淺則揭何其悖哉雄雉雊而雌應之常也濟之方盈以舟不以車理也今曰以車濟盈以雌求雄得非反常乖理之舉乎昏禮用雁何也以其夕則水宿旦則雲飛秩然有序不亂倫也今蒸庶母而生子謂之何哉招招舟子以濟處方深不可徒涉也一舟所濟非一人故曰卭須我友安得犯險徒涉以取覆敗乎谷風刺夫婦之失道也蓋賢婦見棄于夫之詞也采葑菲者用其葉而存其根須其葉之復生也今并根而去之無復生理矣是婦必以無子見去故為是言非謂客貌之衰也方舟泳遊喻其治家之曲折得宜匍匐救喪喻其供億之無所缺乏昔育字誤當曰昔者恐育鞠末章不念昔者可證有洸有潰言其訣去如水之流不可復反也既詒我肄斬絶之辭也肄與汝墳之肄同塈與蔇通左傳猶懼不蔇謂始至也式微黎侯寓衛其臣勸之歸也中露露中言無芘覆但露宿也泥中猶言塗炭言無安宅也旄丘責衛伯也黎侯為狄所迫去而寓衛久不得歸黎大夫責望之詞也晉景公滅赤狄數其棄仲章而奪黎氏地事在衛穆公時則知黎之寓衛在成穆間矣叔兮伯兮謂同姓之諸侯狐裘蒙戎則謂黎侯也不得于衛而屬望諸侯亦可悲矣瑣尾流離之義當如朱傳簡兮刺不用賢也簡兮簡兮擇才之精也方將萬舞僅用之為籥師也以俁俁之貌如虎之力在前上處宜觀表而知裏矣乃卒事之際公但錫以一爵與輝庖閽寺無異何其無知人之鑒哉是以思西周庸庸祗祗之君耳籥但三孔左手以三指抑揚而吹之郭訓是已榛者木下小栽非栗屬也苓即苓耳非大苦也皆在逺難可詳察之物泉水衛女思歸也泉水即衛之百泉泉在衛北淇在衛南北髙南下故泉水趨淇喻已思歸宗國也瑕者過差之詞不瑕有害猶言不甚害義也隋志邢州內丘縣有干言山內丘在衛東北邶地也故附之邶詩北門刺仕不得志也非刺也録賢大夫也斯人既典國政復從王事亦重臣矣而曰終窶且貧室人交謫其廉潔之守幹濟之才存乎言詞之表矣無所怨望唯命是安得非賢乎敦厚也謂厚有所加及也北風刺虐也非刺虐也異姓之臣違亂也北門蓋同姓大夫國雖危亂義不可去此則異姓而仕衛者也道不行言不用第有亟去耳風雪交作之際莫不閉藏奧室今則相與衝冒而去知其亟于違亂耳是尚可以虛徐邪狐者妖獸鬼之所乘烏者鬼雀鳴則凶咎所見無非二物喻在朝者皆不祥之人也靜女刺時也何刺乎刺淫奔也曰靜女曰彤管男悅女之詞也夫淫奔密約而他人歷歷言之其惡寧可掩乎內則婦事舅姑左佩刀礪觽燧右佩針管所謂彤管即所佩之針管耳牧者圉人所居荑則芳潔之物新臺刺衛宣公也新臺之役莫不非議雖執土木之人猶能泚然而愧况衛君乎河水瀰瀰喻其淫佚汚濁之可厭也籧篨戚施胥臣所稱八疾之二皆人所棄者二子乘舟思伋夀也泛泛其景言二子逐流而去無復形景來歸也養養猶言怏怏憤鬱不平之意始焉猶望其能來不瑕有害則決其已死鄘柏舟共薑自誓也牆有茨衛人刺其上也宣公蒸于夷薑而生伋公子頑通乎宣薑而生戴公文公宜乎中冓之言不可道矣茨謂茅之有次第者所以覆牆也梓材稱既勤垣墉其塗塈茨即是茨矣毛傳朱傳並謂蒺藜何其謬哉中冓猶言中垢宫中垢穢之行也欲雅言之故變垢稱冓君子偕老刺宣薑也副者覆首之飾編髮為之笄以連副珈以飾笄唯后夫人得有之翟謂貫珠為翟以冠副笄之上非刻繒以飾衣也承以鬒髮象揥其可知已如山如河如天如帝皆謂威儀莊嚴可敬憚也目中白處曰晳眉上廣處曰顔揚其目則晳見而顔動是貴倨之狀有是威嚴舉國皆尊仰之奈何甘心汚穢以自辱乎斯言外意也桑中刺奔也沫即妹邦朝歌以北之地也唐蓋北方蔬屬故毛傳以為菜名非兔絲也唐也葑也麥也皆易求之物喻孟薑孟弋求之易許也桑中蠶妾之所聚上宫樓閣之通名始通好于桑中終成歡于上宫耳薑齊女也弋莒女也庸則鄘女其邑人也鶉之奔奔刺宣薑也奔奔猶言賁賁鶉盛氣而怒也強強鵲有定偶不相亂也鶉性妬淫兩雄相見必盛氣而鬭鵲則傳枝而孕初不以形接也此刺惠公不能防間其母使公子頑得通之耳定之方中美衛文公也衛懿公為狄所滅文公繼之徙居楚丘務材訓農通商惠工衛人悅而歌誦其事焉作宫作室土木大興即通商惠工之事矣樹之榛栗椅桐梓漆務材也夙駕桑田訓農也星言夙駕戴星而駕也也人猶言此人謂勸農之倌也不獨勸農者秉心塞淵謹於奉職即牧馬之校亦咸得其人故所牧之馬騋而牝者至于三千極言蕃庶耳蝃蝀止奔也非止奔也敬教乎內也文公懲衛之難由乎縱欲亡禮故為是詩使瞽史朝夕諷誦于宫闈之內以示教戒焉陽藴于上隂蒸于下二氣交搆而為雨陽藴已解隂蒸未已則折而為虹霓朝謂之隮暮謂之蝃蝀是地氣之淫也冥漠若無眹兆倐爾成形人皆得而指之以喻男女曖昧之事終不可掩也借令縱欲之人不恥淫奔獨不為性命惜乎禮所謂命以防欲是已相鼠刺無禮也非刺也文公勸學也鼠有齒而無牙竊食偷生不能大害見人猶生畏心似有廉恥節儉之尚在位者竊位尸居肆欲無厭不以禮度自檢有愧于鼠矣人而無止正謂止足之分非容止也干旄美好善也非好善也文公授方任能國人歌其事也鳥隼曰旟大夫之旃也畫鳥隼于帛謂之干旟注旄牛尾于干首謂之干旄析夏翟之羽以為緌謂之干旌實一物也素絲者御馬之轡也轡有六曰四曰五變文叶韻耳言大夫乘是車馬建是干旄出入都鄙尊顯光赫矣不審以何者嘉謨嘉猷入告我君于內乎載馳許穆夫人閔宗國也衛淇奧美武公之德也衛武公九十有五猶針警于國而賓之初筵抑抑威儀皆其所自警之詩恱禮好文可槩見矣河朔無竹淇澳獨産故其詩曰籊籊竹竿以釣于淇非王芻也淇之緑竹猗猗以興武公特稟異氣而生也有切磋琢磨之功乃後有琇瑩會辨之飾兩章後先相應耳瑟兮僴兮者恂栗也赫兮咺兮者威儀也所謂恂栗者戰戰兢兢制節謹度之謂也所謂威儀者臨民以莊尊其瞻視之謂也如金如錫語其知柔知剛也如圭如璧語其能圓能方也車箱而上髙三尺三寸橫一木謂之式自式而上二尺二寸復橫一木謂之較古人立乘憑較有所致敬則俯而憑式自式而上得較故曰重較大夫過二人則式國君唯式宗廟餘無所式矣登車而倚重較易於矜嚴者也武公則寬綽其容歡宴而至戲謔易生陵侮者也武公則以禮自檢是皆剛柔方圓之相濟者也考槃刺莊公也非刺莊也美遁世者之無悶也考者尋討之義槃謂樂也古言考槃猶今言尋樂耳或澗或阿或陸無往而不適或寤而言或寤而歌或寤而宿無適而不獨自以明遁世之志專一也薖與輠通劉向别録所謂炙轂輠髠是也軸以運車輠以脂軸兩者皆進退自得之喻非寬大盤桓之説碩人閔莊薑也非閔也蓋述莊薑始自齊來適衛也錦衣褧襜夫人嫁服也手如柔荑語指之秀而鋭也膚如凝脂語肌膚之白而澤也領如蝤蠐語項之白而延也齒如瓠犀語齒之白而齊也螓蟬之小而有文者螓首語額之方廣蛾眉語眉之曲秀孽孽字韓詩作䡾訓長貌朅字韓詩作桀訓健也氓刺時也何刺乎刺淫奔者失身也抱布貿絲知所誘者鄙夫也子無良媒知未嫁也乘垝垣而以賄遷知竊藏逾牆以相從也三歲食貧賄盡而厭棄之也兄弟嘻笑知見棄而返于家也淇岸隰泮則總角相奔信誓之詞也里女失教不有其躬終見棄黜悔恨何及孔子録之所以昭世戒者深矣竹竿衛女思歸也淇流廣大故多舟楫之嬉女伴羣出縱觀相與巧笑而佩玉蓋若江南觀競渡者述衛俗也思衛者發乎情也以逺兄弟父母為嫌者止乎禮義也此竹竿所以見録乎芄蘭刺惠公驕而無禮也非驕而無禮也刺其縱母之欲無制強解難之才也芄蘭生莢支出於葉間垂之有如觽狀其葉亦頗似韘韘以挽強觽以解結各成其用芄蘭徒有形似耳喻惠公徒有國而無威嚴以制子頑也容兮遂兮容忍不斷使得遂其惡也河廣宋襄公母歸于衛而思宋也一葦杭之謂河方冰時布一束之葦便可履之而度非用蘆葦渡水也今遼左氷結布葦度車馬猶然崇者峻極之謂不崇朝言不極一朝之久也伯兮刺時也鄭康成以為衛宣公從王伐鄭時詩然鄭在衛南即不得言自伯之東矣若文公以後徙居楚丘衛又偏在東北無所事于東矣豈東備山戎東胡之屬故爾久役乎首疾猶言疾首也諼草忘憂之草即鹿蔥也言不得此草憂不能忘是以使我心痗耳有狐刺時也何所刺傷貧困也狐性多疑當河氷初合未肯即度必伏踆岸下審無流澌之聲乃始度焉此云狐垂尾而在淇梁大寒之候將至矣彼之子者終窶且貧無衣無褐何以卒歲乎此我所以用憂也木瓜美齊桓公封衛也非美桓也蓋刺苞苴之禮公行也木瓜木桃木李皆刻木為果以充籩實者物至微矣報以瓊琚瓊瑶瓊玖而猶若有歉焉又為遜順之詞以導之政以賄成有如此詩故卷二
